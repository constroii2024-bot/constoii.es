<title>Constróii · Empresa</title>
<style>
:root{
  --bg:#EFF1EE; --card:#FFFFFF; --ink:#22272B; --ink2:#5A636B;
  --linha:#DDE1DC; --laranja:#E8650D; --laranja-esc:#C45104;
  --verde:#1F7A4D; --verm:#C0392B; --cinza-obra:#3A4750;
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Consolas,monospace;
  --sans:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45}
header{background:var(--cinza-obra);color:#fff;padding:14px 18px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.brand{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px}
.brand h1{font-size:17px;font-weight:800;letter-spacing:.06em}
.brand h1 span{color:var(--laranja)}
.brand .obra{font-family:var(--mono);font-size:12px;opacity:.85}
.gauge{margin:10px 0 12px;background:#2B353D;border-radius:4px;height:22px;position:relative;overflow:hidden}
.gauge .fill{height:100%;background:repeating-linear-gradient(45deg,var(--laranja),var(--laranja) 10px,var(--laranja-esc) 10px,var(--laranja-esc) 20px);transition:width .4s}
.gauge .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
nav{display:flex;gap:2px;overflow-x:auto}
nav button{background:#2B353D;color:#B9C2C9;border:none;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px 6px 0 0;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
nav button .ic{font-size:15px;line-height:1}
#navAbas button.on{box-shadow:inset 0 -3px 0 #6B4A8A}
nav button.on{background:var(--bg);color:var(--ink)}
main{padding:16px;max-width:1100px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:12px}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);margin-bottom:4px}
.card .v{font-family:var(--mono);font-size:19px;font-weight:700}
.card .v.pos{color:var(--verde)}.card .v.neg{color:var(--verm)}.card .v.lar{color:var(--laranja-esc)}
.card .s{font-size:11px;color:var(--ink2);margin-top:2px;font-family:var(--mono)}
h2{font-size:15px;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
h2::before{content:'';width:10px;height:10px;background:var(--laranja);display:inline-block}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--linha);border-radius:8px;overflow:hidden;font-size:13px}
th{background:#F7F8F6;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);border-bottom:1px solid var(--linha)}
td{padding:7px 10px;border-bottom:1px solid var(--linha)}
tr:last-child td{border-bottom:none}
td.n,th.n{text-align:right;font-family:var(--mono)}
.pos{color:var(--verde)}.neg{color:var(--verm)}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:700;font-family:var(--mono)}
.tag.EPS{background:#FDEBDD;color:var(--laranja-esc)}
.tag.BARRAMENTO{background:#E2EDE7;color:var(--verde)}
.tag.PINTURA{background:#E3E8F2;color:#3D5A99}
.tag.HORAS{background:#EEE;color:#555}
.tag.SALARIOS{background:#E3E8F2;color:#3D5A99}
.tag.ALOJAMENTO{background:#F2E8E3;color:#8A5A3D}
.tag.TRANSPORTES{background:#E8F0E3;color:#4A6B2A}
.tag.EQUIPAMENTO{background:#EFE3F2;color:#6B3D8A}
.tag.OUTROS{background:#EEE;color:#555}
.tag.FATURA{background:#E3E8F2;color:#3D5A99}
.tag.CERTIFICACAO{background:#E2EDE7;color:#1F7A4D}
.tag.AUTO{background:#FDEBDD;color:#C45104}
.tag.FOTO{background:#EFE3F2;color:#6B3D8A}
.tag.OUTRO{background:#EEE;color:#555}
.tag.CHEFE{background:#3A4750;color:#fff}
.tag.OFICIAL{background:#E2EDE7;color:var(--verde)}
.tag.SERVENTE{background:#FDEBDD;color:var(--laranja-esc)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
select,input[type=text],input[type=number],input[type=date]{padding:7px 9px;border:1px solid var(--linha);border-radius:6px;font-size:13px;background:#fff;font-family:inherit}
input[type=number]{font-family:var(--mono);text-align:right}
button.act{background:var(--laranja);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer}
button.act:hover{background:var(--laranja-esc)}
button.sec{background:#fff;color:var(--ink);border:1px solid var(--linha);padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer}
button.mini{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px}
.form{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:14px;margin:10px 0}
.form .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form label{display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600}
.chk{display:flex;gap:6px;flex-wrap:wrap}
.chk label{flex-direction:row;align-items:center;gap:5px;background:#F7F8F6;border:1px solid var(--linha);border-radius:6px;padding:6px 10px;font-size:12px;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--ink)}
.chk label.sel{background:#FDEBDD;border-color:var(--laranja)}
.note{font-size:12px;color:var(--ink2);margin:6px 0}
.scroll{overflow-x:auto}
.tot td{font-weight:700;background:#F7F8F6}
.save{position:fixed;bottom:14px;right:14px;background:var(--verde);color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;font-family:var(--mono);opacity:0;transition:opacity .3s;pointer-events:none}
.save.show{opacity:1}
.big{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:14px;margin-bottom:14px}
.big .titulo{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);font-weight:700;margin-bottom:10px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:4px}
.kpi .n1{font-family:var(--mono);font-size:24px;font-weight:800;line-height:1.1}
.kpi .n2{font-size:11px;color:var(--ink2);margin-top:2px}
.pbar{height:18px;background:#ECEEEA;border-radius:4px;overflow:hidden;display:flex;margin:4px 0}
.pbar div{height:100%}
.pbar .feito{background:var(--cor,var(--laranja))}
.pbar .pend{background:repeating-linear-gradient(45deg,#D8DBD5,#D8DBD5 6px,#E8EAE5 6px,#E8EAE5 12px)}
.flinha{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;margin:9px 0}
.flinha .fnum{font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap}
.mchart{display:flex;align-items:flex-end;gap:8px;height:130px;margin:8px 0 4px;padding:0 2px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0}
.mcol .mv{font-family:var(--mono);font-size:10px;color:var(--ink2);margin-bottom:3px;white-space:nowrap}
.mcol .mb{width:100%;max-width:46px;background:var(--laranja);border-radius:3px 3px 0 0;position:relative;overflow:hidden}
.mcol .mb .mp{position:absolute;bottom:0;left:0;right:0;background:var(--cinza-obra);opacity:.45}
.mcol .ml{font-size:10px;color:var(--ink2);margin-top:4px;font-family:var(--mono)}
.m3{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0}
.m3 .m3bars{display:flex;align-items:flex-end;justify-content:center;gap:2px;width:100%;height:100%}
.m3 .m3b{width:30%;max-width:18px;border-radius:2px 2px 0 0;min-height:2px}
.m3 .ml{font-size:10px;color:var(--ink2);margin-top:4px;font-family:var(--mono)}
.wlinha{display:grid;grid-template-columns:110px 1fr auto;gap:10px;align-items:center;margin:8px 0}
.wcard{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.wcard .topo{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.wcard .nome{font-size:14px;font-weight:800}
.wcard .apg{font-family:var(--mono);font-size:17px;font-weight:800;white-space:nowrap}
.wcard .linha2{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
.wcard .mini-n{font-family:var(--mono);font-size:13px}
.wcard details{margin-top:8px;font-size:12px}
.wcard summary{cursor:pointer;color:var(--ink2);font-size:12px}
.wcard .calc{font-family:var(--mono);font-size:12px;color:var(--ink2);padding:8px 0 0;display:flex;gap:14px;flex-wrap:wrap}
.wcard .calc b{color:var(--ink)}
.estado{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.estado.ok{background:#E2EDE7;color:var(--verde)}
.estado.falta{background:#F9E3DF;color:var(--verm)}
.estado.mais{background:#FDEBDD;color:var(--laranja-esc)}
.ledger{font-size:14px}
.ledger .lrow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:7px 4px;border-bottom:1px dashed var(--linha)}
.ledger .lrow.sub{padding-left:22px;font-size:12.5px;color:var(--ink2);border-bottom:none;padding-top:2px;padding-bottom:2px}
.ledger .lrow.res{border-top:2px solid var(--ink);border-bottom:none;margin-top:4px;padding-top:10px}
.ledger .lval{font-family:var(--mono);font-weight:700;white-space:nowrap}
.ledger .res .lval{font-size:22px;font-weight:800}
.ledger .res .llbl{font-size:15px;font-weight:800}

.tlock{max-height:calc(100vh - 250px);overflow:auto}
.tlock th{position:sticky;top:0;z-index:5;background:#F7F8F6;box-shadow:0 1px 0 var(--linha)}
.tlock tr.tot td{position:sticky;bottom:0;background:#F7F8F6;box-shadow:0 -1px 0 var(--linha)}
@media(max-width:640px){
  main{padding:10px}
  td,th{padding:6px}
  .flinha{grid-template-columns:80px 1fr auto}
  .wlinha{grid-template-columns:90px 1fr auto}
  #navAbas button .tx{display:none}
  #navAbas button{padding:10px 13px}
  #navAbas button .ic{font-size:19px}
  #navAbas button.on .tx{display:inline}
  header h1{font-size:14px!important;line-height:1.2}
  input[type=text],input[type=number],input[type=date],input[type=month],select{max-width:100%}
  .cards{grid-template-columns:1fr 1fr!important}
  .big{padding:12px}
}
@media(max-width:400px){
  .cards{grid-template-columns:1fr!important}
}
</style>
</head>

function repararDB(db){
  if(!db.config || !db.config.fases || !Array.isArray(db.config.fases) || !db.config.fases.length){
    if(db.config){ db.config.fases = JSON.parse(JSON.stringify(SEED.config.fases)); }
  }
  db.config.fases.forEach((fa,i)=>{ const sd=SEED.config.fases[i];
    if(!fa.nome || fa.nome===fa.id){ fa.nome = sd?sd.nome:('FASE '+(i+1)); }
    if(!fa.cor){ fa.cor = sd?sd.cor:'#777'; } });
  if(!db.histCfg) db.histCfg=[];
  if(!db.custos) db.custos=[];
  if(!db.certs) db.certs=[];
  if(!db.zones) db.zones=[];
  if(!db.extras) db.extras=[];
  if(db.config.encargosPct==null) db.config.encargosPct=32;
  db.custos.forEach(x=>{ if(x.cat==='SALARIOS'&&x.valorBase==null){ x.valorBase=x.valor; x.valor=Math.round(x.valorBase*(1+db.config.encargosPct/100)*100)/100; } });

  // (avalia o valor base nos salários, para não apagar um salário real por causa dos encargos)
  db.custos = db.custos.filter(x=>{ const v = (x.cat==='SALARIOS' && x.valorBase!=null) ? x.valorBase : x.valor; return !(Math.abs(v)<1); });

  // CONVERSÃO de obras antigas (Segóvia): zonas e tarifas com fases por NOME → ids
  const idsAtuais=db.config.fases.map(f=>f.id);
  const nomesAntigos=['EPS','BARRAMENTO','PINTURA'];
  const usaNomesAntigos = (db.zones||[]).some(z=>z.fases && nomesAntigos.some(n=>z.fases[n]!==undefined) && !idsAtuais.some(id=>z.fases[id]!==undefined));
  if(usaNomesAntigos){
    const mapa={EPS:'F1',BARRAMENTO:'F2',PINTURA:'F3'};
    db.zones.forEach(z=>{ if(!z.fases) return; const nova={}; idsAtuais.forEach(id=>nova[id]=null); Object.keys(z.fases).forEach(k=>{ const id=mapa[k]||k; if(idsAtuais.includes(id)) nova[id]=z.fases[k]; }); z.fases=nova; });

    (db.config.tarifas||[]).forEach(t=>{ if(!t.precos) return; const np={}; Object.keys(t.precos).forEach(k=>{ const id=mapa[k]||k; np[id]=t.precos[k]; }); t.precos=np; });
  }
  return db;
}

function traduzErroAuth(e){
  const c=(e&&e.code)||'';
  if(c.includes('invalid-email')) return 'Email inválido.';
  if(c.includes('missing-password')||c.includes('weak-password')) return 'Palavra-passe fraca (mínimo 6 caracteres).';
  if(c.includes('email-already-in-use')) return 'Esse email já tem conta. Faz "Entrar".';
  if(c.includes('wrong-password')||c.includes('invalid-credential')) return 'Email ou palavra-passe errados.';
  if(c.includes('user-not-found')) return 'Conta não existe. Usa "Criar conta nova".';
  if(c.includes('network')) return 'Sem ligação à internet.';
  return 'Erro: '+(e.message||c);
}

  DB.certs.forEach(c=>s.add(c.mes));
  (DB.custos||[]).forEach(x=>s.add(x.mes));
  return [...s].sort();
}
function tarifaDoMes(mes){
  const ts=DB.config.tarifas;
  for(const t of ts){ if(t.ate && mes<=t.ate) return t; }
  return ts[ts.length-1];
}
function tarifaAtual(){ return DB.config.tarifas[DB.config.tarifas.length-1]; }
function retExtraMes(mes){
  const re=DB.config.retExtra||{};
  const r=re[mes];
  return r&&r.valor>0 ? {valor:r.valor, nota:r.nota||''} : null;
}
function faturavelMes(mes){
  const t=tarifaDoMes(mes); const cp=t.precos;
  const out={}; FASES.forEach(f=>out[f]={m2:0,v:0}); out.HORAS={m2:0,v:0};
  DB.zones.forEach(z=>{ if(z.anulada) return; FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.mes===mes){ out[f].m2+=z.area; out[f].v+=z.area*(cp[f]||0); }
  }); });
  DB.extras.forEach(e=>{ if(e.mes===mes){ const ph=(e.preco!=null?e.preco:(cp.HORAS||0)); out.HORAS.m2+=e.area; out.HORAS.v+=e.area*ph; } });
  out.base=FASES.reduce((a,f)=>a+out[f].v,0)+out.HORAS.v;
  out.retPct=t.ret; out.ret=out.base*t.ret/100;
  const re=retExtraMes(mes);
  out.retExtra = re ? re.valor : 0;
  out.retExtraNota = re ? re.nota : '';
  out.liquido=out.base-out.ret-out.retExtra;
  return out;
}
const CATS=['SALARIOS','ALOJAMENTO','TRANSPORTES','EQUIPAMENTO','OUTROS'];
const CATLBL={SALARIOS:'Salários',ALOJAMENTO:'Alojamento',TRANSPORTES:'Transportes',EQUIPAMENTO:'Equipamento',OUTROS:'Outros'};
function recalcSalarios(){
  const p=DB.config.encargosPct||0;
  DB.custos.forEach(x=>{ if(x.cat==='SALARIOS'&&x.valorBase!=null){ x.valor=Math.round(x.valorBase*(1+p/100)*100)/100; if(x.auto)x.desc='Salários equipa + encargos '+p+'% (sincronizado)'; } });
}
function custosMes(mes){ return DB.custos.filter(x=>x.mes===mes).reduce((a,x)=>a+x.valor,0); }
function zonaFaturado(z){ if(z.anulada) return 0; return FASES.reduce((a,f)=>a+(z.fases[f]&&z.fases[f].mes? z.area*(tarifaDoMes(z.fases[f].mes).precos[f]||0):0),0); }
function zonaPendente(z){ if(z.anulada) return 0; const cp=tarifaAtual().precos; return FASES.reduce((a,f)=>a+((!z.fases[f]||(!z.fases[f].mes&&!z.fases[f].anulada))? z.area*(cp[f]||0):0),0); }
function valorContratoAuto(){
  // valor total do contrato = faturável executado + pendente + horas avulsas, aos preços do cliente
  const tZonas=DB.zones.reduce((a,z)=>a+zonaFaturado(z)+zonaPendente(z),0);
  const tHoras=(DB.extras||[]).reduce((a,e)=>a+e.area*(e.preco!=null?e.preco:(tarifaAtual().precos.HORAS||0)),0);
  return Math.round((tZonas+tHoras)*100)/100;
}

  const maxV=Math.max(...mdata.map(d=>Math.max(d.f.base, d.receb, d.cus)),1);
  html+=`<div class="big"><div class="titulo">Mês a mês</div>

      <div class="m3bars">

        <div class="m3b" title="Recebido ${fmtEur(d.receb)}" style="height:${Math.max(2,d.receb/maxV*100)}%;background:var(--verde)"></div>
        <div class="m3b" title="Custos ${fmtEur(d.cus)}" style="height:${Math.max(2,d.cus/maxV*100)}%;background:var(--verm)"></div>
      </div>
      <div class="ml">${d.mes.slice(5)}/${d.mes.slice(2,4)}</div>
    </div>`).join('')}</div>
    <div class="note" style="margin:0 0 8px"><span style="color:var(--laranja-esc)">■</span> faturável &nbsp; <span style="color:var(--verde)">■</span> recebido &nbsp; <span style="color:var(--verm)">■</span> custos</div>
    <div class="scroll"><table style="font-size:12.5px"><tr><th>Mês</th><th class="n">Faturável</th><th class="n">Custos</th><th class="n">Margem</th><th class="n">%</th><th class="n">Recebido</th><th class="n">Por receber</th></tr>
    ${mdata.map(d=>{const mg=d.f.base-d.cus; const pr=d.f.liquido-d.receb; return `<tr><td>${mesLbl(d.mes)}</td><td class="n">${fmtEur(d.f.base)}</td><td class="n">${fmtEur(d.cus)}</td><td class="n ${mg>=0?'pos':'neg'}"><b>${fmtEur(mg)}</b></td><td class="n">${d.f.base?(mg/d.f.base*100).toFixed(0)+'%':'—'}</td><td class="n" style="color:var(--verde)">${d.receb?fmtEur(d.receb):'—'}</td><td class="n ${pr>0.5?'neg':'pos'}">${fmtEur(pr)}</td></tr>`;}).join('')}
    <tr class="tot"><td>Total</td><td class="n">${fmtEur(fatur)}</td><td class="n">${fmtEur(totCus)}</td><td class="n ${margem>=0?'pos':'neg'}">${fmtEur(margem)}</td><td class="n">${margemPct.toFixed(0)}%</td><td class="n">${fmtEur(totReceb)}</td><td class="n ${faltaReceber>0.5?'neg':'pos'}">${fmtEur(faltaReceber)}</td></tr>
    </table></div>

function rResumo(){
  const FCOR=new Proxy({},{get:(t,k)=>faseCor(k)});
  const meses=mesesAtivos();
  let fatur=0, liq=0;
  const mdata=meses.map(mes=>{
    const f=faturavelMes(mes);
    fatur+=f.base; liq+=f.liquido;
    const certs=DB.certs.filter(c=>c.mes===mes);
    return {mes,f,certBase:certs.reduce((a,c)=>a+c.base,0),receb:certs.reduce((a,c)=>a+c.recebido,0)};

      <div class="kpi"><div class="n1">${fmtEur(pend)}</div><div class="n2">por concluir (à tarifa atual)</div></div>
      <div class="kpi"><div class="n1" style="color:var(--verde)">${fmtEur(totReceb)}</div><div class="n2">recebido</div></div>
      <div class="kpi"><div class="n1" style="color:var(--ink2)">${fmtEur(totRet)}</div><div class="n2">retenção garantia (a recuperar)</div></div>
      <div class="kpi"><div class="n1" style="color:${liq-totReceb>0.5?'var(--verm)':'var(--verde)'}">${fmtEur(liq-totReceb)}</div><div class="n2">por receber (líquido − recebido)</div></div>
      <div class="kpi"><div class="n1" style="color:${fatur-totCustos>=0?'var(--verde)':'var(--verm)'}">${fmtEur(fatur-totCustos)}</div><div class="n2">margem real (− custos ${fmtEur(totCustos)})</div></div>
    </div>

  </div>`;

  return html;
}

function rM2(){
  const cp=tarifaAtual().precos;
  // ===== ZONAS PRONTAS (€): uma zona só está pronta quando todas as fases ativas estão feitas =====
  let vTotal=0, vPronto=0, vFalta=0;       // €: valor total da obra, € das zonas prontas, € por terminar
  let nZonasTotal=0, nZonasProntas=0;
  DB.zones.forEach(z=>{
    if(z.anulada) return;
    let temFaseAtiva=false, todasFeitas=true, valorZona=0;
    FASES.forEach(f=>{
      const fd=z.fases[f];
      if(fd&&fd.anulada) return;
      temFaseAtiva=true;
      // valor da fase: ao preço do mês em que foi feita, ou à tarifa atual se ainda pendente
      const preco = (fd&&fd.mes) ? (tarifaDoMes(fd.mes).precos[f]||0) : (cp[f]||0);
      valorZona += z.area*preco;
      if(!(fd&&fd.mes)) todasFeitas=false;
    });
    if(!temFaseAtiva) return;
    nZonasTotal++; vTotal+=valorZona;
    if(todasFeitas){ nZonasProntas++; vPronto+=valorZona; }
    else vFalta+=valorZona;
  });
  const pctGeral=vTotal?vPronto/vTotal*100:0;

  // ===== POR FASE (€): faturado e pendente =====
  const fdata={}; FASES.forEach(f=>fdata[f]={fat:0,pend:0});
  DB.zones.forEach(z=>{ if(z.anulada) return; FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.anulada) return;
    if(fd&&fd.mes) fdata[f].fat+=z.area*(tarifaDoMes(fd.mes).precos[f]||0);
    else fdata[f].pend+=z.area*(cp[f]||0);
  }); });

  // ===== MÊS A MÊS (€): valor faturado em cada mês (todas as fases concluídas nesse mês) =====
  const mesV={};
  DB.zones.forEach(z=>{ if(z.anulada) return; FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.mes&&!fd.anulada){ mesV[fd.mes]=(mesV[fd.mes]||0)+z.area*(tarifaDoMes(fd.mes).precos[f]||0); }
  }); });
  // horas avulsas por mês
  (DB.extras||[]).forEach(e=>{ if(e.mes){ const ph=(e.preco!=null?e.preco:(cp.HORAS||0)); mesV[e.mes]=(mesV[e.mes]||0)+e.area*ph; } });
  const mesesV=Object.keys(mesV).sort();
  const maxMes=Math.max(...mesesV.map(m=>mesV[m]),1);
  const totFatMes=mesesV.reduce((a,m)=>a+mesV[m],0);

  let html=`<div style="background:${pctGeral>=100?'var(--verde)':'var(--laranja)'};color:#fff;border-radius:10px;padding:16px 22px;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:13px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;opacity:.9">Valor das zonas 100% prontas</div>
      <div style="font-size:14px;opacity:.85;margin-top:2px">${fmtEur(vPronto)} de ${fmtEur(vTotal)} · falta ${fmtEur(vFalta)} · ${nZonasProntas} de ${nZonasTotal} zonas</div>
    </div>
    <div style="font-family:var(--mono);font-size:34px;font-weight:800">${pctGeral.toFixed(0)}%</div>
  </div>`;

  // cartões de totais (€)
  html+=`<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:14px">
    <div class="card" style="border-left:4px solid var(--ink2)"><div class="k">Valor total (auto)</div><div class="v" style="font-size:24px">${fmtEur(vTotal)}</div><div class="s">${nZonasTotal} zonas</div></div>
    <div class="card" style="border-left:4px solid var(--verde)"><div class="k">€ zonas prontas</div><div class="v pos" style="font-size:24px">${fmtEur(vPronto)}</div><div class="s">${nZonasProntas} zonas · todas as fases feitas</div></div>
    <div class="card" style="border-left:4px solid var(--laranja)"><div class="k">€ por terminar</div><div class="v" style="font-size:24px;color:var(--laranja-esc)">${fmtEur(vFalta)}</div><div class="s">${nZonasTotal-nZonasProntas} zonas por terminar</div></div>
  </div>`;

  // por fase (€)
  const totFat=FASES.reduce((a,f)=>a+fdata[f].fat,0);
  const totPend=FASES.reduce((a,f)=>a+fdata[f].pend,0);
  const totTot=totFat+totPend;
  const pctFat=totTot?totFat/totTot*100:0;
  html+=`<div class="big"><div class="titulo">Valor por fase (€)</div>
    <div class="scroll"><table style="font-size:13px"><tr><th>Fase</th><th class="n">Faturado</th><th class="n">Pendente</th><th class="n">Total</th><th class="n">%</th></tr>
    ${FASES.map(f=>{ const d=fdata[f]; const tot=d.fat+d.pend; const pct=tot?d.fat/tot*100:0; return `<tr><td>${tagFase(f)}</td><td class="n pos">${fmtEur(d.fat)}</td><td class="n" style="color:var(--laranja-esc)">${fmtEur(d.pend)}</td><td class="n">${fmtEur(tot)}</td><td class="n"><b>${pct.toFixed(0)}%</b></td></tr>`; }).join('')}
    <tr class="tot"><td>Total</td><td class="n pos">${fmtEur(totFat)}</td><td class="n" style="color:var(--laranja-esc)">${fmtEur(totPend)}</td><td class="n">${fmtEur(totTot)}</td><td class="n">${pctFat.toFixed(0)}%</td></tr>
    </table></div>
    <div class="note" style="margin:0">Esta tabela conta <b>cada fase separadamente</b> (€ já faturado vs € pendente). O valor das "zonas 100% prontas" no topo só conta uma zona quando <b>todas as fases dela</b> estão feitas.</div>
  </div>`;

  // progresso por fase (barras, €)
  html+=`<div class="big"><div class="titulo">Progresso por fase (€)</div>`;
  FASES.forEach(f=>{
    const d=fdata[f]; const tot=d.fat+d.pend; const pct=tot?d.fat/tot*100:0;
    html+=`<div class="flinha">
      ${tagFase(f)}
      <div><div class="pbar" style="--cor:${faseCor(f)}"><div class="feito" style="width:${pct}%"></div><div class="pend" style="width:${100-pct}%"></div></div></div>
      <div class="fnum"><b>${pct.toFixed(0)}%</b> · ${fmtEur(d.fat)} faturado${d.pend>0.01?` · <span class="neg">${fmtEur(d.pend)} pendente</span>`:''}</div>
    </div>`;
  });
  // horas avulsas faturadas
  const hV=(DB.extras||[]).reduce((a,e)=>a+e.area*(e.preco!=null?e.preco:(cp.HORAS||0)),0);
  if(hV>0.01){
    html+=`<div class="flinha">
      <span class="tagF" style="background:#7772;color:#555;font-weight:700;font-size:10px;padding:1px 6px;border-radius:4px">HORAS</span>
      <div><div class="pbar" style="--cor:#888"><div class="feito" style="width:100%"></div></div></div>
      <div class="fnum"><b>${fmtEur(hV)}</b> faturado</div>
    </div>`;
  }
  html+=`</div>`;

  // mês a mês (€)
  html+=`<div class="big"><div class="titulo">Faturado mês a mês (€)</div>`;
  if(mesesV.length){
    html+=`<div class="mchart">${mesesV.map(m=>`<div class="mcol">
      <div class="mv">${(mesV[m]/1000).toFixed(1)}k</div>
      <div class="mb" style="height:${Math.max(4,mesV[m]/maxMes*100)}%;background:var(--laranja)"></div>
      <div class="ml">${m.slice(5)}/${m.slice(2,4)}</div>
    </div>`).join('')}</div>
    <div class="scroll"><table style="font-size:13px"><tr><th>Mês</th><th class="n">Faturado</th><th class="n">Acumulado</th></tr>
    ${(()=>{ let ac=0; return mesesV.map(m=>{ ac+=mesV[m]; return `<tr><td>${mesLbl(m)}</td><td class="n pos">${fmtEur(mesV[m])}</td><td class="n">${fmtEur(ac)}</td></tr>`; }).join(''); })()}
    <tr class="tot"><td>Total</td><td class="n pos">${fmtEur(totFatMes)}</td><td class="n">${fmtEur(totFatMes)}</td></tr>
    </table></div>`;
  } else {
    html+=`<div class="note" style="margin:0">Ainda não há fases concluídas com data de auto.</div>`;
  }
  html+=`</div>`;
  return html;
}

      <div class="row" style="align-items:flex-end">

        <label>Mês de conclusão<input type="text" id="lbMes" value="${mesAtual()}" style="width:95px"></label>

      </div></div>`;

  }).sort((a,b)=>((a.dataAuto||'9999-99-99')<(b.dataAuto||'9999-99-99')?-1:(a.dataAuto||'9999-99-99')>(b.dataAuto||'9999-99-99')?1:0));

    const anulTxt = FASES.filter(f=>anFase[f]>0.01).map(f=>`${faseNome(f)} ${fmtN(anFase[f])} m²`).join(' · ');
    const fechado=!!autoMesFechado[mk];

// ===== Arquivo de documentos (IndexedDB) =====
const DCATS=['FATURA','CERTIFICACAO','AUTO','FOTO','OUTRO'];
const DCATLBL={FATURA:'Fatura',CERTIFICACAO:'Certificação',AUTO:'Auto',FOTO:'Foto da obra',OUTRO:'Outro'};
const idb={
  db:null,
  open(){ return new Promise((res,rej)=>{
    if(idb.db) return res();
    const r=indexedDB.open('constroii_arquivo_'+KEY,1);
    r.onupgradeneeded=()=>{ r.result.createObjectStore('files',{keyPath:'id',autoIncrement:true}); };
    r.onsuccess=()=>{ idb.db=r.result; res(); };
    r.onerror=()=>rej(r.error);
  });},
  add(rec){ return idb.open().then(()=>new Promise((res,rej)=>{
    const t=idb.db.transaction('files','readwrite').objectStore('files').add(rec);
    t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);
  }));},
  all(){ return idb.open().then(()=>new Promise((res,rej)=>{
    const t=idb.db.transaction('files','readonly').objectStore('files').getAll();
    t.onsuccess=()=>res(t.result||[]); t.onerror=()=>rej(t.error);
  }));},
  del(id){ return idb.open().then(()=>new Promise((res,rej)=>{
    const t=idb.db.transaction('files','readwrite').objectStore('files').delete(id);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  }));}
};

  el.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">'+files.map(f=>{
    const url=URL.createObjectURL(f.blob);

function barraPrazo(c){
  const ini=c.dataInicio, fim=c.dataFimPrev, real=c.dataFimReal;
  if(!ini && !fim && !real) return '';
  const concl=!!c.concluida;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const dI=ini?new Date(ini+'T00:00:00'):null;
  const dF=fim?new Date(fim+'T00:00:00'):null;
  const dR=real?new Date(real+'T00:00:00'):null;
  const ref = dR ? dR : ((concl && dF) ? dF : hoje);
  const dias=(a,b)=>Math.round((b-a)/86400000);
  const fmtD=d=>d?d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
  let cartoes='', barra='';
  const acabou = concl || !!dR;
  if(dI){ const dec=dias(dI,ref); cartoes+=`<div class="card"><div class="k">Início</div><div class="v" style="font-size:16px">${fmtD(dI)}</div><div class="s">${acabou?dec+' dias de duração':(dec>=0?dec+' dias decorridos':'começa em '+(-dec)+' dias')}</div></div>`; }
  if(dF){
    if(acabou){ cartoes+=`<div class="card"><div class="k">Fim previsto</div><div class="v" style="font-size:16px">${fmtD(dF)}</div><div class="s">data prevista</div></div>`; }
    else { const falta=dias(hoje,dF); const atras=falta<0; cartoes+=`<div class="card" style="border-left:4px solid ${atras?'var(--verm)':'var(--verde)'}"><div class="k">Fim previsto</div><div class="v" style="font-size:16px;color:${atras?'var(--verm)':'inherit'}">${fmtD(dF)}</div><div class="s">${atras?Math.abs(falta)+' dias em atraso':falta+' dias em falta'}</div></div>`; }
  }
  if(dR){
    let sub='🏁 obra concluída';
    if(dF){ const dif=dias(dF,dR); sub = dif===0 ? '🏁 acabou no prazo' : (dif<0 ? '🏁 '+Math.abs(dif)+' dias antes do previsto' : '🏁 '+dif+' dias depois do previsto'); }
    const cor = dF && dias(dF,dR)>0 ? 'var(--laranja-esc)' : 'var(--verde)';
    cartoes+=`<div class="card" style="border-left:4px solid ${cor}"><div class="k">Fim real</div><div class="v" style="font-size:16px;color:${cor}">${fmtD(dR)}</div><div class="s">${sub}</div></div>`;
  } else if(concl && dF){
    cartoes+=`<div class="card" style="border-left:4px solid var(--verde)"><div class="k">Fim real</div><div class="v" style="font-size:16px;color:var(--ink2)">—</div><div class="s">define na app Funcionários</div></div>`;
  }
  if(dI&&dF){ const tot=dias(dI,dF); const dec=Math.max(0,Math.min(tot,dias(dI,ref))); const pct=tot>0?Math.round(dec/tot*100):0; const atras=!acabou&&hoje>dF;
    barra=`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink2);margin-bottom:4px"><span>${acabou?'100% — concluída':pct+'% do prazo decorrido'}</span><span>${tot} dias de prazo total</span></div>
      <div style="height:16px;background:var(--linha);border-radius:8px;overflow:hidden"><div style="height:100%;width:${acabou?100:Math.min(100,pct)}%;background:${acabou?'var(--verde)':atras?'var(--verm)':pct>85?'var(--laranja)':'var(--verde)'};border-radius:8px;transition:width .3s"></div></div></div>`;
  }
  return `<div style="margin-top:12px"><div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">${cartoes}</div>${barra}</div>`;
}

function impSyncPacote(p){
  try{
    // aviso se a obra do pacote não corresponde à obra ativa
    const norm0=s=>String(s||'').toUpperCase().replace(/\s+/g,' ').trim();
    const obraPac=norm0(p.obra), obraAtu=norm0(DB.config.obra);
    if(obraPac && obraAtu && obraPac!==obraAtu){
      if(!confirm('⚠ ATENÇÃO — obras diferentes!\n\nO ficheiro é da obra "'+p.obra+'", mas a obra ativa aqui é "'+DB.config.obra+'".\n\nSe continuares, os autos da obra "'+p.obra+'" vão entrar na obra "'+DB.config.obra+'".\n\nTroca primeiro para a obra certa no seletor do topo, ou continua se for mesmo isto que queres.\n\nOK = importar mesmo assim · Cancelar = parar')) return;
    }
    if(p.fasesCfg&&p.fasesCfg.length){ DB.config.fases=p.fasesCfg; }
    if(p.concluida!==undefined){ DB.config.concluida=!!p.concluida; }
    if(p.dataInicio!==undefined){ DB.config.dataInicio=p.dataInicio||''; }
    if(p.dataFimPrev!==undefined){ DB.config.dataFimPrev=p.dataFimPrev||''; }
    if(p.dataFimReal!==undefined){ DB.config.dataFimReal=p.dataFimReal||''; }
    const norm=s=>String(s||'').toUpperCase().replace(/\s+/g,' ').trim();
    let atual=0, novas=0, fasesNovas=0, anuladas=0, removidas=0;
    const vistas=new Set();
    p.zones.forEach(sz=>{
      let z=DB.zones.find(x=>norm(x.desc)===norm(sz.desc)&&Math.abs(x.area-sz.area)<0.05);
      if(!z){
        z={id:DB.nextZoneId++,desc:sz.desc,comp:sz.comp,alt:sz.alt,area:sz.area,dataAuto:sz.dataAuto||'',fases:Object.fromEntries(FASES.map(f=>[f,null]))};
        DB.zones.push(z); novas++;
      }
      vistas.add(z.id);
      let mudou=false;
      if(!!sz.anulada !== !!z.anulada){ z.anulada=!!sz.anulada; mudou=true; anuladas++; }
      FASES.forEach(ff=>{
        const src=sz.fases[ff];
        if(src&&src.anulada){
          if(!z.fases[ff]||!z.fases[ff].anulada){ z.fases[ff]={anulada:true}; mudou=true; anuladas++; }
        } else if(src&&src.mes){
          if(!z.fases[ff]||z.fases[ff].mes!==src.mes||z.fases[ff].anulada){ z.fases[ff]={mes:src.mes}; mudou=true; fasesNovas++; }
        } else {
          if(z.fases[ff]&&z.fases[ff].anulada){ z.fases[ff]=null; mudou=true; }
        }
      });
      if(mudou) atual++;
    });
    // remover zonas que JÁ NÃO vêm no pacote (foram eliminadas na app Funcionários).
    // Todas as zonas da Empresa vêm da sincronização, por isso uma zona que não está
    // no pacote significa que foi apagada na origem e deve sair também aqui.
    const antesRem=DB.zones.length;
    DB.zones=DB.zones.filter(z=>vistas.has(z.id));
    removidas=antesRem-DB.zones.length;
    let horasNovas=0;
    (p.extras||[]).forEach(se=>{
      if(!DB.extras.find(x=>norm(x.desc)===norm(se.desc)&&x.mes===se.mes&&Math.abs(x.area-se.area)<0.01)){
        DB.extras.push({id:DB.nextExtraId++,desc:se.desc,area:se.area,mes:se.mes}); horasNovas++;
      }
    });
    let salariosAtu=0;
    // os salários "auto" passam a ser EXATAMENTE os que vêm no pacote.
    // assim, se anulaste fases nos Funcionários e o salário de um mês baixou ou
    // desapareceu, a Empresa reflete isso (remove os meses que já não vêm).
    if(p.salarios){
      DB.custos = DB.custos.filter(x=> !(x.auto && x.cat==='SALARIOS') );
      (p.salarios||[]).forEach(s=>{
        DB.custos.push({id:DB.nextCustoId++,mes:s.mes,cat:'SALARIOS',desc:'',valorBase:s.valor,valor:0,data:'',auto:true});
        salariosAtu++;
      });
    }
    let equipAtu=0;
    // compatibilidade: formato antigo (só equipamentos) — também substitui totalmente
    if(p.equipamentos){
      DB.custos = DB.custos.filter(x=> !(x.auto && !x.partilhado && x.cat==='EQUIPAMENTO') );
      (p.equipamentos||[]).forEach(s=>{
        DB.custos.push({id:DB.nextCustoId++,mes:s.mes,cat:'EQUIPAMENTO',desc:'Equipamentos/materiais (sincronizado)',valorBase:s.valor,valor:s.valor,data:'',auto:true});
        equipAtu++;
      });
    }
    // novo formato: custos partilhados (deslocação/alojamento/refeições/equipamento), por categoria e mês
    const lblPart={TRANSPORTES:'Deslocações',ALOJAMENTO:'Alojamento',OUTROS:'Custos gerais',EQUIPAMENTO:'Equipamentos'};
    const catsPart=['TRANSPORTES','ALOJAMENTO','OUTROS','EQUIPAMENTO'];
    // primeiro, remover os custos auto-partilhados antigos destas categorias (vão ser repostos com os valores novos)
    // (assim, se um valor baixou ou desapareceu, fica certo)
    if(p.custosPartilhados){
      DB.custos = DB.custos.filter(x=> !(x.auto && x.partilhado && catsPart.includes(x.cat)) );
      (p.custosPartilhados||[]).forEach(s=>{
        const cat=catsPart.includes(s.cat)?s.cat:'OUTROS';
        DB.custos.push({id:DB.nextCustoId++,mes:s.mes,cat,desc:(lblPart[cat]||'Custo')+' (partilhado, sincronizado)',valorBase:s.valor,valor:s.valor,data:'',auto:true,partilhado:true});
        equipAtu++;
      });
    }
    recalcSalarios();

    r.onload=()=>{
      let p;
      try{ p=JSON.parse(r.result); }catch(x){ alert('Ficheiro inválido: não é um JSON válido.'); ev.target.value=''; return; }
      if(!p||p.tipo!=='sync_constroii_autos'){ alert('Este não é um ficheiro de sincronização de autos.\n\nNa app Funcionários, usa o botão "⇄ Exportar autos para a app Empresa" e importa aqui o ficheiro gerado.'); ev.target.value=''; return; }
      impSyncPacote(p);
    };
    r.readAsText(f);
    ev.target.value='';
  }; };
  const abrirSync=()=>{
    let sf=$('syncFile');
    if(!sf){ sf=document.createElement('input'); sf.type='file'; sf.accept='.json'; sf.id='syncFile'; sf.style.display='none'; document.body.appendChild(sf); }
    bindSync(sf);
    sf.click();
  };
  if($('syncFile')) bindSync($('syncFile'));
  if($('bSyncIn')) $('bSyncIn').onclick=abrirSync;
  if($('bSyncIn2')) $('bSyncIn2').onclick=abrirSync;
  if($('bExp')) $('bExp').onclick=()=>{
    const out={tipo:'constroii_backup_multi', exportado:hojeData(), store:STORE};
    const a=document.createElement('a');
    a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(out,null,1));
    a.download='constroii_empresa_TODAS_OBRAS_'+hojeData()+'.json'; a.click();
    STORE.ultimoBackup=hojeData(); save(); render();
  };
  if($('bImp')) $('bImp').onclick=()=>$('impFile').click();
  if($('impFile')) $('impFile').onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=()=>{
      let p;
      try{ p=JSON.parse(r.result); }catch(x){ alert('Ficheiro inválido: não é um JSON válido.'); e.target.value=''; return; }
      if(p && p.tipo==='sync_constroii_autos'){
        if(!confirm('Este é um ficheiro de SINCRONIZAÇÃO de autos (da app Funcionários), não uma cópia de segurança.\n\nQueres sincronizá-lo para a obra ATIVA (acrescentar autos/anulações/salários sem apagar nada)?\n\nOK = sincronizar · Cancelar = não fazer nada')){ e.target.value=''; return; }
        impSyncPacote(p); e.target.value=''; return;
      }
      if(p && p.tipo==='constroii_backup_multi' && p.store && p.store.obras){
        if(!confirm('Isto substitui TODAS as obras pelas do ficheiro. Continuar?')){ e.target.value=''; return; }
        STORE=p.store; STORE.obras.forEach(o=>o.db=repararDB(o.db));
        if(!STORE.obras.find(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0].id;
        DB=obraAtiva().db; save(); render(); e.target.value=''; return;
      }
      if(p && p.config && Array.isArray(p.zones)){
        if(!confirm('Este ficheiro é de uma obra só. Acrescentar como nova obra?')){ e.target.value=''; return; }
        const id='obra'+Date.now(); STORE.obras.push({id,nome:(p.config.obra||'Obra importada'),db:repararDB(p)}); STORE.ativa=id; DB=obraAtiva().db; save(); render(); e.target.value=''; return;
      }
      alert('Ficheiro inválido.'); e.target.value='';
    };
    r.readAsText(f);
  };
  if($('bAq')) $('bAq').onclick=async()=>{
    const inp=$('aqFile');
    if(!inp.files||!inp.files.length){alert('Escolhe pelo menos um ficheiro.');return;}
    const mes=$('aqMes').value.trim();
    if(mes && !mes.match(/^\d{4}-\d{2}$/)){alert('Mês no formato AAAA-MM (ou deixa vazio).');return;}
    let n=0;
    try{
      for(const f of inp.files){
        await idb.add({nome:f.name,cat:$('aqCat').value,mes,desc:$('aqDesc').value.trim(),tipo:f.type,tamanho:f.size,data:hoje(),blob:f});
        n++;
      }
    }catch(er){ alert('Erro a arquivar: '+er); }
    inp.value=''; $('aqDesc').value='';
    alert(n+' documento(s) arquivado(s).');
    listarArq();
  };
  if($('aqFCat')) $('aqFCat').onchange=ev=>{arqFiltCat=ev.target.value;listarArq();};
  if($('aqFMes')) $('aqFMes').oninput=ev=>{arqFiltMes=ev.target.value.trim();listarArq();};
  if($('bLimpar')) $('bLimpar').onclick=()=>{
    if(!confirm('Limpar TODOS os autos?\n\nIsto apaga as zonas/medições e as horas. A configuração (tarifas, cliente, encargos) mantém-se.')) return;
    const tudo=confirm('Apagar também as CERTIFICAÇÕES e os CUSTOS registados?\n\nOK = apagar tudo (obra do zero)\nCancelar = manter certificações e custos');
    DB.zones=[]; DB.extras=[];
    if(tudo){ DB.certs=[]; DB.custos=[]; }
    registaCfg('Autos limpos'+(tudo?' (incluindo certificações e custos)':' (certificações e custos mantidos)'));
    save(); render();
  };
  if($('bReset')) $('bReset').onclick=()=>{ if(confirm('Isto apaga tudo o que alteraste e volta aos dados iniciais. Continuar?')){ DB=JSON.parse(JSON.stringify(SEED)); save(); render(); }};
}

let _arrancou=false;
async function arrancarComUtilizador(){
  if(_arrancou) return;
  _arrancou=true;
  let temNuvem=false;
  try{
    fbDocRef = fbDB.collection('obras_es').doc(FB_DOC);
    const snap=await fbDocRef.get();
    if(snap.exists){ const d=snap.data(); if(d&&d.store){ try{ localStorage.setItem(KEY_MULTI, d.store); temNuvem=true; }catch(e){} } }
  }catch(e){ console.error('carregar nuvem', e); }
  await load();
  if(!temNuvem){ try{ await nuvemGuardar(); }catch(e){} }
  ligarSyncTempoReal();
}
if(fbReady){
  fbAuth.onAuthStateChanged(u=>{
    fbUser=u;
    if(u){ esconderLogin(); arrancarComUtilizador(); }
    else { mostrarLogin(''); }
  });
} else {
  esconderLogin(); load();
