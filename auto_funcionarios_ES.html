<title>Constróii · Funcionários</title>
<style>
:root{
  --bg:#EFF1EE; --card:#FFFFFF; --ink:#22272B; --ink2:#5A636B;
  --linha:#DDE1DC; --laranja:#E8650D; --laranja-esc:#C45104;
  --verde:#1F7A4D; --verm:#C0392B; --cinza-obra:#3A4750;
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Consolas,monospace;
  --sans:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45}
header{background:var(--cinza-obra);color:#fff;padding:14px 18px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.brand{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px}
.brand h1{font-size:17px;font-weight:800;letter-spacing:.06em}
.brand h1 span{color:var(--laranja)}
.brand .obra{font-family:var(--mono);font-size:12px;opacity:.85}
.gauge{margin:10px 0 12px;background:#2B353D;border-radius:4px;height:22px;position:relative;overflow:hidden}
.gauge .fill{height:100%;background:repeating-linear-gradient(45deg,var(--laranja),var(--laranja) 10px,var(--laranja-esc) 10px,var(--laranja-esc) 20px);transition:width .4s}
.gauge .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
nav{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{background:#2B353D;color:#B9C2C9;border:none;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px 6px 0 0;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
nav button.on{background:var(--bg);color:var(--ink)}
nav button .ic{font-size:15px;line-height:1}
#navAbas button.on{box-shadow:inset 0 -3px 0 var(--laranja-esc)}
main{padding:16px;max-width:1100px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:12px}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);margin-bottom:4px}
.card .v{font-family:var(--mono);font-size:19px;font-weight:700}
.card .v.pos{color:var(--verde)}.card .v.neg{color:var(--verm)}.card .v.lar{color:var(--laranja-esc)}
.card .s{font-size:11px;color:var(--ink2);margin-top:2px;font-family:var(--mono)}
h2{font-size:15px;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
h2::before{content:'';width:10px;height:10px;background:var(--laranja);display:inline-block}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--linha);border-radius:8px;overflow:hidden;font-size:13px}
th{background:#F7F8F6;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);border-bottom:1px solid var(--linha)}
td{padding:7px 10px;border-bottom:1px solid var(--linha)}
tr:last-child td{border-bottom:none}
td.n,th.n{text-align:right;font-family:var(--mono)}
.pos{color:var(--verde)}.neg{color:var(--verm)}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:700;font-family:var(--mono)}
.tag.EPS{background:#FDEBDD;color:var(--laranja-esc)}
.tag.BARRAMENTO{background:#E2EDE7;color:var(--verde)}
.tag.PINTURA{background:#E3E8F2;color:#3D5A99}
.tag.HORAS{background:#EEE;color:#555}
.tag.CHEFE{background:#3A4750;color:#fff}
.tag.OFICIAL{background:#E2EDE7;color:var(--verde)}
.tag.SERVENTE{background:#FDEBDD;color:var(--laranja-esc)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
select,input[type=text],input[type=number],input[type=date]{padding:7px 9px;border:1px solid var(--linha);border-radius:6px;font-size:13px;background:#fff;font-family:inherit}
input[type=number]{font-family:var(--mono);text-align:right}
button.act{background:var(--laranja);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer}
button.act:hover{background:var(--laranja-esc)}
button.sec{background:#fff;color:var(--ink);border:1px solid var(--linha);padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer}
button.mini{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px}
.form{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:14px;margin:10px 0}
.form .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form label{display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600}
.chk{display:flex;gap:6px;flex-wrap:wrap}
.chk label{flex-direction:row;align-items:center;gap:5px;background:#F7F8F6;border:1px solid var(--linha);border-radius:6px;padding:6px 10px;font-size:12px;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--ink)}
.chk label.sel{background:#FDEBDD;border-color:var(--laranja)}
.note{font-size:12px;color:var(--ink2);margin:6px 0}
.scroll{overflow-x:auto}
.tot td{font-weight:700;background:#F7F8F6}
.save{position:fixed;bottom:14px;right:14px;background:var(--verde);color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;font-family:var(--mono);opacity:0;transition:opacity .3s;pointer-events:none}
.save.show{opacity:1}
.big{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:14px;margin-bottom:14px}
.big .titulo{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);font-weight:700;margin-bottom:10px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:4px}
.kpi .n1{font-family:var(--mono);font-size:24px;font-weight:800;line-height:1.1}
.kpi .n2{font-size:11px;color:var(--ink2);margin-top:2px}
.pbar{height:18px;background:#ECEEEA;border-radius:4px;overflow:hidden;display:flex;margin:4px 0}
.pbar div{height:100%}
.pbar .feito{background:var(--cor,var(--laranja))}
.pbar .pend{background:repeating-linear-gradient(45deg,#D8DBD5,#D8DBD5 6px,#E8EAE5 6px,#E8EAE5 12px)}
.flinha{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;margin:9px 0}
.flinha .fnum{font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap}
.mchart{display:flex;align-items:flex-end;gap:8px;height:130px;margin:8px 0 4px;padding:0 2px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0}
.mcol .mv{font-family:var(--mono);font-size:10px;color:var(--ink2);margin-bottom:3px;white-space:nowrap}
.mcol .mb{width:100%;max-width:46px;background:var(--laranja);border-radius:3px 3px 0 0;position:relative;overflow:hidden}
.mcol .mb .mp{position:absolute;bottom:0;left:0;right:0;background:var(--cinza-obra);opacity:.45}
.mcol .ml{font-size:10px;color:var(--ink2);margin-top:4px;font-family:var(--mono)}
.wlinha{display:grid;grid-template-columns:110px 1fr auto;gap:10px;align-items:center;margin:8px 0}
.wcard{background:var(--card);border:1px solid var(--linha);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.wcard .topo{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.wcard .nome{font-size:14px;font-weight:800}
.wcard .apg{font-family:var(--mono);font-size:17px;font-weight:800;white-space:nowrap}
.wcard .linha2{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
.wcard .mini-n{font-family:var(--mono);font-size:13px}
.wcard details{margin-top:8px;font-size:12px}
.wcard summary{cursor:pointer;color:var(--ink2);font-size:12px}
.wcard .calc{font-family:var(--mono);font-size:12px;color:var(--ink2);padding:8px 0 0;display:flex;gap:14px;flex-wrap:wrap}
.wcard .calc b{color:var(--ink)}
.estado{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.estado.ok{background:#E2EDE7;color:var(--verde)}
.estado.falta{background:#F9E3DF;color:var(--verm)}
.estado.mais{background:#FDEBDD;color:var(--laranja-esc)}

.tlock{max-height:calc(100vh - 250px);overflow:auto}
.tlock th{position:sticky;top:0;z-index:5;background:#F7F8F6;box-shadow:0 1px 0 var(--linha)}
.tlock tr.tot td{position:sticky;bottom:0;background:#F7F8F6;box-shadow:0 -1px 0 var(--linha)}
@media(max-width:640px){
  main{padding:10px}
  td,th{padding:6px}
  .flinha{grid-template-columns:80px 1fr auto}
  .wlinha{grid-template-columns:90px 1fr auto}
  /* abas: só ícone, maiores para o dedo */
  #navAbas button .tx{display:none}
  #navAbas button{padding:10px 13px;font-size:13px}
  #navAbas button .ic{font-size:19px}
  #navAbas button.on .tx{display:inline}
  #navAbas button.on{padding:10px 14px}
  /* cabeçalho compacto */
  header h1{font-size:14px!important;line-height:1.2}
  /* botões globais mais pequenos mas tocáveis */
  #btnVencimentos,#btnCustosGer{padding:8px 12px;font-size:13px}
  /* inputs ocupam a largura toda em vez de larguras fixas apertadas */
  input[type=text],input[type=number],input[type=date],input[type=month],select{max-width:100%}
  .cards{grid-template-columns:1fr 1fr!important}
  .big{padding:12px}
}
@media(max-width:400px){
  .cards{grid-template-columns:1fr!important}
  #navAbas button .ic{font-size:18px}
}
@keyframes pulseCG{0%,100%{box-shadow:0 3px 10px rgba(232,101,13,.45)}50%{box-shadow:0 3px 18px rgba(232,101,13,.85)}}
#btnCustosGer{animation:pulseCG 2.2s ease-in-out infinite}
#btnCustosGer:hover{transform:translateY(-1px);filter:brightness(1.07)}
</style>

const KEY = 'constroii_es_func_v2';

let DB = null;       // aponta para a obra ativa (.db)
let STORE = null;    // { obras:[{id,nome,db}], ativa:id }
function obraAtiva(){ return STORE.obras.find(o=>o.id===STORE.ativa) || STORE.obras[0]; }
// m² equivalentes FEITOS de uma obra (medida do trabalho, para repartir custos gerais)
function trabalhoObra(db){
  if(!db||!db.zones) return 0;
  const fases=(db.config&&db.config.fases&&db.config.fases.length)? db.config.fases.filter(f=>f.ativa!==false) : [{id:'F1',peso:40},{id:'F2',peso:40},{id:'F3',peso:20}];
  const pesoDe=(id)=>{ const f=fases.find(x=>x.id===id); if(f&&f.peso!=null)return f.peso; const d={F1:40,F2:40,F3:20}; return d[id]||0; };
  let somaP=0; fases.forEach(f=>somaP+=pesoDe(f.id)); if(somaP<=0)somaP=100;
  let eq=0;
  db.zones.forEach(z=>{ if(z.anulada)return; fases.forEach(f=>{ const fd=z.fases[f.id]; if(fd&&!fd.anulada&&fd.mes) eq+=z.area*(pesoDe(f.id)/somaP); }); });
  return eq;
}
// lista global de custos gerais (partilhados entre obras)
function custosGerais(){ if(!STORE.custosGerais) STORE.custosGerais=[]; return STORE.custosGerais; }
// m² equivalentes feitos de uma obra NUM MÊS específico (AAAA-MM)
function trabalhoObraMes(db, ym){
  if(!db||!db.zones) return 0;
  const fases=(db.config&&db.config.fases&&db.config.fases.length)? db.config.fases.filter(f=>f.ativa!==false) : [{id:'F1',peso:40},{id:'F2',peso:40},{id:'F3',peso:20}];
  const pesoDe=(id)=>{ const f=fases.find(x=>x.id===id); if(f&&f.peso!=null)return f.peso; const d={F1:40,F2:40,F3:20}; return d[id]||0; };
  let somaP=0; fases.forEach(f=>somaP+=pesoDe(f.id)); if(somaP<=0)somaP=100;
  let eq=0;
  db.zones.forEach(z=>{ if(z.anulada)return; fases.forEach(f=>{ const fd=z.fases[f.id]; if(fd&&!fd.anulada&&fd.mes===ym) eq+=z.area*(pesoDe(f.id)/somaP); }); });
  return eq;
}
// lista de meses (AAAA-MM) entre dois meses inclusive
function mesesEntre(mesIni, mesFim){
  if(!mesIni) return [];
  if(!mesFim) mesFim=mesIni;
  if(mesFim<mesIni){ const t=mesIni; mesIni=mesFim; mesFim=t; }
  const out=[]; let [y,m]=mesIni.split('-').map(Number); const [yf,mf]=mesFim.split('-').map(Number);
  let guard=0;
  while((y<yf||(y===yf&&m<=mf)) && guard<120){ out.push(y+'-'+String(m).padStart(2,'0')); m++; if(m>12){m=1;y++;} guard++; }
  return out;
}
// repartir um custo (com período mesIni→mesFim) pelas obras, mês a mês conforme m² de cada mês
// devolve {obraId: valorTotal} e também {obraId: {mes: valor}} se detalhe=true
function obraConcluida(id){ const o=STORE.obras.find(x=>x.id===id); return !!(o&&o.db&&o.db.config&&o.db.config.concluida); }
function reparteCustoMensal(valor, mesIni, mesFim, obrasIncl, detalhe){
  const meses=mesesEntre(mesIni, mesFim);
  const out={}; STORE.obras.forEach(o=>out[o.id]=0);
  const det={};
  if(!meses.length){ return detalhe?{out,det}:out; }
  const parcelaMes = valor/meses.length; // valor igual por mês
  // obrasIncl com itens = lista explícita (pode incluir concluídas, se o utilizador as marcou).
  // obrasIncl vazio/ausente = "todas" → usa só as obras ATIVAS (não concluídas).
  const obras = (obrasIncl&&obrasIncl.length)? obrasIncl : STORE.obras.filter(o=>!obraConcluida(o.id)).map(o=>o.id);
  // para o fallback (mês sem trabalho em ninguém): obras ativas (não concluídas) e o seu trabalho TOTAL
  const ativas = obras.filter(id=>!obraConcluida(id));
  const baseFallbackObras = ativas.length? ativas : obras; // se todas concluídas, usa todas
  const trabTotal={}; let baseTotal=0;
  baseFallbackObras.forEach(id=>{ const o=STORE.obras.find(x=>x.id===id); const t=o?trabalhoObra(o.db):0; trabTotal[id]=t; baseTotal+=t; });
  meses.forEach(ym=>{
    // m² de cada obra incluída nesse mês
    const trab={}; let base=0;
    obras.forEach(id=>{ const o=STORE.obras.find(x=>x.id===id); const t=o?trabalhoObraMes(o.db,ym):0; trab[id]=t; base+=t; });
    if(base>0){
      // há trabalho nesse mês → reparte pelos m² desse mês
      obras.forEach(id=>{ const q=parcelaMes*trab[id]/base; out[id]=(out[id]||0)+q; if(detalhe){ if(!det[id])det[id]={}; det[id][ym]=q; } });
    } else {
      // mês parado → reparte pelas obras ativas na proporção do trabalho TOTAL de cada uma
      baseFallbackObras.forEach(id=>{

        out[id]=(out[id]||0)+q;
        if(detalhe){ if(!det[id])det[id]={}; det[id][ym]=q; }
      });
    }
  });
  return detalhe?{out,det}:out;
}
// dias de trabalho de uma pessoa, por obra, num intervalo [de,ate] — varre o mapa de TODAS as obras
function diasTrabPessoaPorObra(nome, de, ate){
  const out={}; // {obraId: nºdias}
  STORE.obras.forEach(o=>{
    const aus=(o.db&&o.db.ausencias)||[];
    let n=0;
    aus.forEach(a=>{ if(a.nome===nome && a.tipo==='trabalho' && a.dia && a.dia>=de && a.dia<=ate) n++; });

function renomearFuncionario(antigo, novo){

    if(db.ausencias) db.ausencias.forEach(a=>{ if(a.nome===antigo) a.nome=novo; });
    // pagamentos
    if(db.payments) db.payments.forEach(p=>{ if(p.funcionario===antigo) p.funcionario=novo; });
    // equipas das zonas/fases
    if(db.zones) db.zones.forEach(z=>{ if(z.fases) Object.keys(z.fases).forEach(f=>{ const fd=z.fases[f]; if(fd&&Array.isArray(fd.equipa)) fd.equipa=fd.equipa.map(x=>x===antigo?novo:x); }); });
    // equipas dos extras (horas)
    if(db.extras) db.extras.forEach(e=>{ if(Array.isArray(e.equipa)) e.equipa=e.equipa.map(x=>x===antigo?novo:x); });
  });
  // apelido acompanha o novo nome
  if(STORE.apelidos && STORE.apelidos[antigo]!==undefined){ STORE.apelidos[novo]=STORE.apelidos[antigo]; delete STORE.apelidos[antigo]; }
  return true;
}

function baseFerias(){ return (STORE.vencCfg&&STORE.vencCfg.baseFerias!=null)? STORE.vencCfg.baseFerias : 920; }
function baseFaltas(){ return (STORE.vencCfg&&STORE.vencCfg.baseFaltas!=null)? STORE.vencCfg.baseFaltas : 1300; }
// cálculo do vencimento de um funcionário num mês.
// O aPagar de cada obra (via ganhoObrasMes) JÁ inclui o desconto de faltas e o acréscimo
// de férias, seguindo o mapa de trabalho de cada obra. Aqui só separamos as parcelas
// para as mostrar na tabela, sem voltar a descontar (senão seria a dobrar).
function vencimentoMes(nome, ym){
  const total = ganhoObrasMes(nome, ym);          // já com faltas/férias aplicadas
  const nFaltas = diasAusenciaGlobal(nome, ym, 'faltas');
  const nFerias = diasAusenciaGlobal(nome, ym, 'ferias');
  const valorDiaFerias = baseFerias()/30;
  const valorDiaFaltas = baseFaltas()/30;
  const descFaltas = nFaltas*valorDiaFaltas;
  const addFerias  = nFerias*valorDiaFerias;
  const ganho = total + descFaltas - addFerias;   // ganho só das tarefas (reconstruído)
  return { nome, ym, ganho, nFaltas, nFerias, valorDiaFerias, valorDiaFaltas, descFaltas, addFerias, total };
}
function novaObraDB(nome){ const d=JSON.parse(JSON.stringify(SEED)); d.config.obra=nome||''; return d; }
function repararDB(db){
  if(!db.config || !db.config.fases || !Array.isArray(db.config.fases) || !db.config.fases.length){
    if(db.config){ db.config.fases = JSON.parse(JSON.stringify(SEED.config.fases)); }
  }
  db.config.fases.forEach((fa,i)=>{ const sd=SEED.config.fases[i];
    if(!fa.nome || fa.nome===fa.id){ fa.nome = sd?sd.nome:('FASE '+(i+1)); }
    if(!fa.cor){ fa.cor = sd?sd.cor:'#777'; } });
  if(!db.histCfg) db.histCfg=[];
  if(!db.zones) db.zones=[];
  if(!db.extras) db.extras=[];
  if(!db.payments) db.payments=[];
  if(!db.workers) db.workers=[];
  if(!db.roles) db.roles={};
  if(!db.config.precos) db.config.precos={};
  // CONVERSÃO de obras antigas (Segóvia): zonas com fases por NOME (EPS/BARRAMENTO/PINTURA) → ids (F1/F2/F3)
  const idsAtuais=db.config.fases.map(f=>f.id);
  const nomesAntigos=['EPS','BARRAMENTO','PINTURA'];
  const usaNomesAntigos = db.zones.some(z=>z.fases && nomesAntigos.some(n=>z.fases[n]!==undefined) && !idsAtuais.some(id=>z.fases[id]!==undefined));
  if(usaNomesAntigos){
    const mapa={EPS:'F1',BARRAMENTO:'F2',PINTURA:'F3'};
    db.zones.forEach(z=>{
      if(!z.fases) return;
      const nova={}; idsAtuais.forEach(id=>nova[id]=null);
      Object.keys(z.fases).forEach(k=>{ const id=mapa[k]||k; if(idsAtuais.includes(id)) nova[id]=z.fases[k]; });
      z.fases=nova;
      if(z.precos){ const np={}; Object.keys(z.precos).forEach(k=>{ const id=mapa[k]||k; np[id]=z.precos[k]; }); z.precos=np; }
    });
    // precos da config
    if(db.config.precos){ const np={}; Object.keys(db.config.precos).forEach(k=>{ const id=mapa[k]||k; np[id]=db.config.precos[k]; }); db.config.precos=np; }
  }
  return db;
}

const store={
  async get(k){
    try{ if(window.storage&&window.storage.get){ const r=await window.storage.get(k); if(r&&r.value) return r.value; } }catch(e){}
    try{ const v=localStorage.getItem(k); if(v) return v; }catch(e){}

  },

function ligarSyncTempoReal(){
  if(!fbReady || !fbUser) return;
  fbDocRef = fbDB.collection('obras_es').doc(FB_DOC);
  // ouvir alterações em tempo real (de qualquer dispositivo)
  fbDocRef.onSnapshot(snap=>{
    if(!snap.exists) return;
    const d=snap.data(); if(!d || !d.store) return;
    try{
      const remoto=JSON.parse(d.store);
      const localTxt=JSON.stringify(STORE);
      if(d.store===localTxt) return; // igual, nada a fazer
      _aplicandoRemoto=true;
      STORE=remoto;
      STORE.obras.forEach(o=>{ o.db=repararDB(o.db); });

      try{ localStorage.setItem(KEY_MULTI, d.store); }catch(e){}
      render();
      _aplicandoRemoto=false;
    }catch(e){ console.error('onSnapshot', e); _aplicandoRemoto=false; }
  }, err=>console.error('snapshot err', err));

function traduzErroAuth(e){
  const c=(e&&e.code)||'';
  if(c.includes('invalid-email')) return 'Email inválido.';
  if(c.includes('missing-password')||c.includes('weak-password')) return 'Palavra-passe fraca (mínimo 6 caracteres).';
  if(c.includes('email-already-in-use')) return 'Esse email já tem conta. Faz "Entrar".';
  if(c.includes('wrong-password')||c.includes('invalid-credential')) return 'Email ou palavra-passe errados.';
  if(c.includes('user-not-found')) return 'Conta não existe. Usa "Criar conta nova".';
  if(c.includes('network')) return 'Sem ligação à internet.';
  return 'Erro: '+(e.message||c);
}

async function load(){
  // tentar carregar o formato multi-obra
  try{ const v=await store.get(KEY_MULTI); if(v){ STORE=JSON.parse(v); } }catch(e){}
  if(!STORE || !STORE.obras || !STORE.obras.length){
    // migração: havia uma obra única no formato antigo?
    let antiga=null;
    try{ const v=await store.get(KEY); if(v) antiga=JSON.parse(v); }catch(e){}
    if(antiga){
      STORE={obras:[{id:'obra1', nome:(antiga.config&&antiga.config.obra)||'Obra 1', db:repararDB(antiga)}], ativa:'obra1'};
    } else {
      STORE = JSON.parse(JSON.stringify(STORE_INICIAL));
    }
  }
  // reparar todas as obras
  STORE.obras.forEach(o=>{ o.db=repararDB(o.db); if(!o.nome) o.nome=(o.db.config&&o.db.config.obra)||'Obra'; });
  // migrar equipamentos que estavam por obra (DB.equipamentos) para a lista global (STORE.equipamentos)
  if(!STORE.equipamentos) STORE.equipamentos=[];
  STORE.obras.forEach(o=>{ if(o.db&&o.db.equipamentos&&o.db.equipamentos.length){ o.db.equipamentos.forEach(e=>{ if(!STORE.equipamentos.find(x=>x.id===e.id)) STORE.equipamentos.push(e); }); delete o.db.equipamentos; } });
  // migrar custos gerais cuja lista de obras cobre TODAS as obras existentes → [] (= todas, incl. futuras)
  // assim, ao criar uma obra nova, ela passa a receber automaticamente esses custos partilhados
  if(STORE.custosGerais && STORE.custosGerais.length){
    const idsAtuais=STORE.obras.map(o=>o.id);
    STORE.custosGerais.forEach(c=>{
      if(c.obras && c.obras.length && idsAtuais.every(id=>c.obras.includes(id))){ c.obras=[]; }
    });
  }
  if(!STORE.ativa || !STORE.obras.find(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0].id;
  DB=obraAtiva().db;
  DB.zones.forEach(z=>{ if(z.precos) return; z.precos={}; FASES.forEach(f=>{ z.precos[f] = z.fases[f]&&z.fases[f].preco!=null ? z.fases[f].preco : (DB.config.precos[f]||0); }); });
  try{ save(); render(); }
  catch(e){ console.error('render falhou', e); DB=novaObraDB('Obra 1'); STORE={obras:[{id:'obra1',nome:'Obra 1',db:DB}],ativa:'obra1'}; save(); render(); }
}

function diasExtraTrabMes(nome, ym){
  if(!DB.ausencias) return 0;
  let n=0;
  DB.ausencias.forEach(a=>{ if(a.nome===nome && a.dia && a.dia.slice(0,7)===ym && (a.tipo==='trabalho'||a.tipo==='trabalhou')){ const w=new Date(a.dia+'T00:00:00').getDay(); if(w===0||w===6) n++; } });
  return n;
}
// dias úteis (seg-sex) totais de um mês AAAA-MM
function diasUteisMes(ym){
  const [y,m]=ym.split('-').map(Number); const nd=new Date(y,m,0).getDate(); let n=0;
  for(let d=1;d<=nd;d++){ const w=new Date(y,m-1,d).getDay(); if(w!==0&&w!==6) n++; }
  return n;
}
// há dias de trabalho marcados para alguém neste mês?
function mesTemMapaTrab(ym){ if(!DB.ausencias) return false; return DB.ausencias.some(a=>a.dia&&a.dia.slice(0,7)===ym&&a.tipo==='trabalho'); }
// equipa (nomes) que fez uma fase num mês
function equipaFaseMes(mes,fase){ const s=new Set(); DB.zones.forEach(z=>{ if(z.anulada)return; const fd=z.fases[fase]; if(fd&&fd.mes===mes&&fd.equipa) fd.equipa.forEach(w=>s.add(w)); }); return [...s]; }
// equipa (nomes DISTINTOS) que trabalhou num mês, em qualquer fase
function equipaMesG(mes){ const s=new Set(); DB.zones.forEach(z=>{ if(z.anulada)return; FASES.forEach(f=>{ const fd=z.fases[f]; if(fd&&!fd.anulada&&fd.mes===mes&&fd.equipa) fd.equipa.forEach(w=>s.add(w)); }); }); return [...s]; }
// dias de trabalho de UMA pessoa num mês: se há mapa marcado, conta os marcados; senão estima (dias úteis − ausências + extra fds)
function diasTrabPessoa(nome, mes){
  if(mesTemMapaTrab(mes)) return diasTrabMes(nome, mes);
  return Math.max(0, diasUteisMes(mes) - diasAusenciaUteisMes(nome,mes)) + diasExtraTrabMes(nome,mes);
}
// horas-homem TOTAIS de um mês: soma dos dias de trabalho de cada pessoa da equipa × 8h
function hhMesG(mes){
  const HDIA=8;
  const equipa=equipaMesG(mes);
  let hh=0;
  equipa.forEach(nome=>{ hh += diasTrabPessoa(nome,mes)*HDIA; });
  return hh;
}
const AUS_TIPOS_LBL={trabalho:'Trabalho',ferias:'Férias',faltas:'Faltas',inativos:'Faltas',trabalhou:'Trabalho'};
// há dias de trabalho marcados nesta fase neste mês?
function mesTemMapaFase(ym,fase){ if(!DB.ausencias) return false; return DB.ausencias.some(a=>a.dia&&a.dia.slice(0,7)===ym&&a.tipo==='trabalho'&&(a.fase||FASES[0])===fase); }
// horas-homem de uma fase num mês.
// Como não há certeza dos dias exatos por fase, repartem-se as horas TOTAIS do mês
// pelas fases na proporção dos m² EQUIVALENTES (m² × peso) feitos de cada fase nesse mês.
function hhFaseMesG(mes,fase){
  const HDIA=8;
  const k=mes+'|'+fase, r=DB.prodReg&&DB.prodReg[k];
  if(r&&r.dias>0&&r.pessoas>0) return r.dias*HDIA*r.pessoas;
  const hhMesTot=hhMesG(mes); // horas totais do mês (todos os dias de trabalho)
  if(hhMesTot<=0) return 0;
  // m² equivalentes (m² × peso) de cada fase feita nesse mês
  const pesos=pesosNorm();
  let eqFase=0, eqTot=0;
  FASES.forEach(f=>{
    let m2=0; DB.zones.forEach(z=>{ if(z.anulada)return; const fd=z.fases[f]; if(fd&&!fd.anulada&&fd.mes===mes) m2+=z.area; });
    const eq=m2*(pesos[f]||0)/100;
    eqTot+=eq; if(f===fase) eqFase=eq;
  });
  if(eqTot<=0) return 0;
  return hhMesTot * (eqFase/eqTot);
}
// horas-homem de uma fase num mês SEGUNDO OS DIAS MARCADOS (vista real, não repartida)
function hhFaseMesReal(mes,fase){
  const HDIA=8;
  if(mesTemMapaTrab(mes)){
    let diasFase=0;
    (DB.ausencias||[]).forEach(a=>{ if(a.dia&&a.dia.slice(0,7)===mes&&a.tipo==='trabalho'&&(a.fase||FASES[0])===fase) diasFase++; });
    return diasFase*HDIA;
  }
  const equipa=equipaFaseMes(mes,fase);
  let hh=0; equipa.forEach(nome=>{ hh += diasTrabPessoa(nome,mes)*HDIA; });
  return hh;
}
// lista de tarefas pagáveis de um mês: {fase, valor, equipa, area}
function tarefasMes(mes){
  const out=[];
  DB.zones.forEach(z=>{ if(z.anulada) return; FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd && fd.mes===mes) out.push({fase:f, valor:z.area*fd.preco, equipa:fd.equipa||[], area:z.area});
  }); });
  DB.extras.forEach(e=>{ if(e.mes===mes) out.push({fase:'HORAS', valor:e.area*e.preco, equipa:e.equipa||[], area:e.area}); });
  return out;
}
function zonaValor(z){ if(z.anulada) return 0; return FASES.reduce((a,f)=>a+(z.fases[f]&&z.fases[f].mes? z.area*z.fases[f].preco:0),0); }
function precoZona(z,f){ return z.precos&&z.precos[f]!=null ? z.precos[f] : DB.config.precos[f]; }
function faseAnulada(z,f){ return z.fases[f] && z.fases[f].anulada; }
function zonaPendente(z){ if(z.anulada) return 0; return FASES.reduce((a,f)=>a+((!z.fases[f]||(!z.fases[f].mes&&!z.fases[f].anulada))? z.area*(precoZona(z,f)||0):0),0); }
function orcamentoAuto(){

  let t=DB.zones.reduce((a,z)=>a+zonaValor(z)+zonaPendente(z),0);

}

function precoFaseMes(mes,fase){

  for(const z of DB.zones){ const fd=z.fases[fase]; if(fd&&fd.mes===mes&&fd.preco!=null) return fd.preco; }

// ===== Cálculo de pagamentos por funcionário (lógica do Excel) =====
function calcMes(mes){
  const cfg = DB.config;
  const roles = DB.roles[mes] || {};
  const base = {};
  tarefasMes(mes).forEach(it=>{
    if(!it.equipa || !it.equipa.length) return;
    const sh = it.valor/it.equipa.length;
    it.equipa.forEach(w=>{ base[w]=(base[w]||0)+sh; });
  });
  const ws = Object.keys(base).filter(w=>base[w]>0.005);
  const role = w => roles[w] || 'OFICIAL';
  const oficiais = ws.filter(w=>role(w)==='OFICIAL');
  const serventes = ws.filter(w=>role(w)==='SERVENTE');
  const naoServ = ws.filter(w=>role(w)!=='SERVENTE');
  const naoChefe = ws.filter(w=>role(w)!=='CHEFE');
  const avgOf = oficiais.length ? oficiais.reduce((a,w)=>a+base[w],0)/oficiais.length : 0;
  const out = {};
  // dedução servente (16% do valor base de oficial) e pool a redistribuir
  let pool = 0;
  ws.forEach(w=>{ out[w]={base:base[w],ajServ:0,redistrib:0,bonusChefe:0,acertoChefe:0}; });
  serventes.forEach(w=>{ const d = (avgOf||base[w]) * cfg.pctServente/100; out[w].ajServ = -d; pool += d; });
  if(naoServ.length) naoServ.forEach(w=>{ out[w].redistrib = pool/naoServ.length; });
  // bónus de chefe financiado pelos restantes (só se houver chefe no mês)
  const temChefe = ws.some(w=>role(w)==='CHEFE');
  ws.forEach(w=>{
    if(role(w)==='CHEFE') out[w].bonusChefe = base[w]*cfg.pctChefe/100;
    else if(temChefe && naoChefe.length) out[w].acertoChefe = -(cfg.pctChefe/100/naoChefe.length)*base[w];
  });
  const vDiaFaltas = (typeof baseFaltas==='function'? baseFaltas():1300)/30;
  const vDiaFerias = (typeof baseFerias==='function'? baseFerias():920)/30;
  ws.forEach(w=>{
    const o = out[w];
    o.bruto = o.base + o.ajServ + o.redistrib + o.bonusChefe + o.acertoChefe;
    o.retencao = -o.bruto*cfg.pctRetencao/100;
    o.aPagarTarefas = o.bruto + o.retencao;            // só tarefas (sem faltas/férias)
    // faltas/férias deste funcionário nesta obra neste mês (segue o mapa de trabalho)
    o.nFaltas = diasAusenciaObra(DB, w, mes, 'faltas');
    o.nFerias = diasAusenciaObra(DB, w, mes, 'ferias');
    o.descFaltas = o.nFaltas * vDiaFaltas;
    o.addFerias  = o.nFerias * vDiaFerias;
    o.aPagar = o.aPagarTarefas - o.descFaltas + o.addFerias;
    o.role = role(w);
  });
  return out;
}
function aPagarAcum(w){
  let t=0; mesesAtivos().forEach(m=>{ const c=calcMes(m); if(c[w]) t+=c[w].aPagar; }); return t;
}
function pagoAcum(w){ return DB.payments.filter(p=>p.funcionario===w).reduce((a,p)=>a+p.valor,0); }
function retencaoAcum(w){ let t=0; mesesAtivos().forEach(m=>{ const c=calcMes(m); if(c[w]) t+=Math.abs(c[w].retencao||0); }); return t; }
function disponivel(w){ return aPagarAcum(w)-pagoAcum(w); }
function trabalhoPorFunc(mes){
  // para cada funcionário: m² e valor da sua parte, por fase
  const out={};
  DB.zones.forEach(z=>FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.mes===mes&&fd.equipa&&fd.equipa.length){
      const qm=z.area/fd.equipa.length, qv=z.area*fd.preco/fd.equipa.length;
      fd.equipa.forEach(w=>{ if(!out[w])out[w]=novoTrabFases();
        out[w][f].m2+=qm; out[w][f].v+=qv; });
    }
  }));
  DB.extras.forEach(e=>{ if(e.mes===mes&&e.equipa&&e.equipa.length){
    const qh=e.area/e.equipa.length, qv=e.area*e.preco/e.equipa.length;
    e.equipa.forEach(w=>{ if(!out[w])out[w]=novoTrabFases();
      out[w].HORAS.h+=qh; out[w].HORAS.v+=qv; });
  }});
  return out;
}
function novoTrabFases(){ const o={}; FASES.forEach(f=>o[f]={m2:0,v:0}); o.HORAS={h:0,v:0}; return o; }
function trabalhoMes(mes){
  // m² e valor por fase concluída nesse mês (à base dos autos)
  const out={}; FASES.forEach(f=>out[f]={m2:0,v:0,preco:0}); out.HORAS={h:0,v:0,preco:0};
  DB.zones.forEach(z=>FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.mes===mes){ out[f].m2+=z.area; out[f].v+=z.area*fd.preco; out[f].preco=fd.preco; }
  }));
  DB.extras.forEach(e=>{ if(e.mes===mes){ out.HORAS.h+=e.area; out.HORAS.v+=e.area*e.preco; out.HORAS.preco=e.preco; } });
  out.total=FASES.reduce((a,f)=>a+out[f].v,0)+out.HORAS.v;
  return out;
}
function pagosMes(mes){
  const m={};
  DB.payments.filter(p=>p.mes===mes).forEach(p=>{ m[p.funcionario]=(m[p.funcionario]||0)+p.valor; });
  return m;
}

function rProd(){
  const DIAS=20, HDIA=8, HMES=DIAS*HDIA;
  const meses=mesesAtivos();
  const FS=FASES; // ids dinâmicos
  const fm={}; meses.forEach(m=>{ fm[m]={}; FS.forEach(f=>fm[m][f]=0); });
  DB.zones.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.mes&&fm[fd.mes]) fm[fd.mes][f]+=z.area; }); });
  const trabMes=(mes)=>{ const s=new Set(); DB.zones.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.mes===mes&&fd.equipa) fd.equipa.forEach(w=>s.add(w)); }); }); DB.extras.forEach(e=>{ if(e.mes===mes&&e.equipa) e.equipa.forEach(w=>s.add(w)); }); return s.size; };
  const trabFaseMes=(mes,fase)=>{ const s=new Set(); DB.zones.forEach(z=>{ if(z.anulada)return; const fd=z.fases[fase]; if(fd&&fd.mes===mes&&fd.equipa) fd.equipa.forEach(w=>s.add(w)); }); return s.size; };
  const zonaCompletaMes=(z)=>{ if(z.anulada)return null; let ultimo=null,todas=true; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.anulada)return; if(fd&&fd.mes){ if(!ultimo||fd.mes>ultimo)ultimo=fd.mes; } else todas=false; }); return todas?ultimo:null; };
  const zc={}, zcN={}; meses.forEach(m=>{zc[m]=0;zcN[m]=0;});
  DB.zones.forEach(z=>{ const m=zonaCompletaMes(z); if(m&&zc[m]!=null){ zc[m]+=z.area; zcN[m]++; } });
  const hhFaseMes=(mes,fase)=>hhFaseMesG(mes,fase);
  // produtividade ponderada

  const pesos=pesosNorm(); // pesos normalizados das fases ativas
  const data=meses.map(mes=>{
    let tot=0; FS.forEach(f=>tot+=fm[mes][f]);
    const hh={}; FS.forEach(f=>hh[f]=hhFaseMes(mes,f));
    let equiv=0; FS.forEach(f=>equiv+=fm[mes][f]*(pesos[f]||0)/100); // m² equivalentes (ponderados)
    const hhTot=hhMesG(mes); // horas-homem totais do mês (pessoas distintas, contadas 1 vez)
    const prodPond = hhTot? equiv/hhTot : 0; // m² equivalentes por hora-homem
    return {mes, fm:fm[mes], tot, nt:trabMes(mes), zc:zc[mes], zcN:zcN[mes], hh, equiv, hhTot, prodPond};
  }).filter(d=>d.tot>0.01||d.zc>0.01);
  const dataReal=data.filter(d=>d.tot>1); // só meses com trabalho real (≥1 m²; exclui resíduos e meses só com zona completada)

  let Ttot=0,Tzc=0,TzcN=0,Tequiv=0,ThhTot=0;
  data.forEach(d=>{ FS.forEach(f=>{ Tf[f]+=d.fm[f]; Thh[f]+=d.hh[f]; }); Ttot+=d.tot; Tzc+=d.zc; TzcN+=d.zcN; Tequiv+=d.equiv; if(d.tot>1) ThhTot+=d.hhTot; });
  const mesesCount=data.length||1;
  const mhh={}; FS.forEach(f=>mhh[f]= Thh[f]? Tf[f]/Thh[f]:0);
  const prodPondGeral = ThhTot? Tequiv/ThhTot : 0; // produtividade ponderada total

  // cartões — um por fase
  let html=`<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px">
    ${FS.map(f=>`<div class="card" style="border-left:4px solid ${faseCor(f)}">
      <div class="k">${tagFase(f)}</div>
      <div class="v" style="font-size:22px;color:${faseCor(f)}">${fmtN(mhh[f])} m²/h·h</div>
      <div class="s">${fmtN(Tf[f])} m² · ${fmtN(Thh[f])} h-homem</div>
    </div>`).join('')}
    <div class="card" style="border-left:4px solid var(--verde)">
      <div class="k">Zonas completas</div>
      <div class="v pos" style="font-size:22px">${fmtN(Tzc)} m²</div>
      <div class="s">${TzcN} zonas acabadas</div>
    </div>
    <div class="card" style="border-left:4px solid var(--laranja)">
      <div class="k">Produtividade ponderada</div>
      <div class="v" style="font-size:22px;color:var(--laranja-esc)">${fmtN(prodPondGeral)} m²-eq/h·h</div>
      <div class="s">${fmtN(Tequiv)} m²-equiv · ${fmtN(ThhTot)} h-homem</div>
    </div>
  </div>`;

  // tabela m² por fase + dias/pessoas
  html+=`<div class="big"><div class="titulo">m² por fase, por mês</div>
    <div class="scroll"><table style="font-size:11.5px"><tr><th>Mês</th>${FS.map(f=>`<th class="n">${tagFase(f)}</th>`).join('')}</tr>
    ${dataReal.map(d=>`<tr><td><b>${mesLbl(d.mes)}</b></td>

    </tr>`).join('')}
    <tr class="tot"><td>Total m²</td>${FS.map(f=>`<td class="n">${fmtN(Tf[f])}</td>`).join('')}</tr>
    </table></div>

  </div>

  <div class="big"><div class="titulo">Horas por fase: marcadas vs repartidas</div>
    <div class="note" style="margin-top:0">A coluna <b>marcadas</b> mostra os dias que registaste em cada fase no mapa. A coluna <b>repartida</b> distribui as horas totais do mês pela proporção de m² feitos — é esta que entra na produtividade, por não dependeres de saber os dias exatos de cada fase.</div>
    <div class="scroll"><table style="font-size:11.5px"><tr><th>Mês</th>${FS.map(f=>`<th class="n" colspan="2">${tagFase(f)}</th>`).join('')}</tr>

    ${dataReal.map(d=>`<tr><td>${mesLbl(d.mes)}</td>${FS.map(f=>{const real=hhFaseMesReal(d.mes,f); const rep=hhFaseMesG(d.mes,f); return `<td class="n" style="color:var(--ink2)">${real?fmtN(real)+'h':'—'}</td><td class="n"><b>${rep?fmtN(rep)+'h':'—'}</b></td>`;}).join('')}</tr>`).join('')}

  // produtividade ponderada mês a mês
  const dataPond=dataReal; // só meses com trabalho real (exclui meses fantasma)
  const maxPond=Math.max(...dataPond.map(d=>d.prodPond),0.001);
  let TequivP=0, ThhTotP=0; dataPond.forEach(d=>{ TequivP+=d.equiv; ThhTotP+=d.hhTot; });
  const prodPondGeralReal = ThhTotP? TequivP/ThhTotP : 0;
  html+=`<div class="big"><div class="titulo">Produtividade ponderada mês a mês (m² equivalentes por hora-homem)</div>

    <div class="mchart">${dataPond.map(d=>`<div class="mcol">
      <div class="mv">${fmtN(d.prodPond)}</div>

    ${dataPond.map(d=>`<tr><td>${mesLbl(d.mes)}</td><td class="n">${fmtN(d.equiv)}</td><td class="n">${fmtN(d.hhTot)}</td><td class="n"><b>${fmtN(d.prodPond)}</b></td></tr>`).join('')}
    <tr class="tot"><td>Total / média</td><td class="n">${fmtN(TequivP)}</td><td class="n">${fmtN(ThhTotP)}</td><td class="n">${fmtN(prodPondGeralReal)}</td></tr>
    </table></div>
  </div>`;

  return html;
}

function calcPrevisao(){
  const HDIA=8, HMES=20*HDIA, FS=FASES;
  const meses=mesesAtivos();
  const pesos=pesosNorm();
  const fm={}; meses.forEach(m=>{ fm[m]={}; FS.forEach(f=>fm[m][f]=0); });
  DB.zones.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.mes&&fm[fd.mes]) fm[fd.mes][f]+=z.area; }); });
  const trabFaseMes=(mes,fase)=>{ const s=new Set(); DB.zones.forEach(z=>{ if(z.anulada)return; const fd=z.fases[fase]; if(fd&&fd.mes===mes&&fd.equipa) fd.equipa.forEach(w=>s.add(w)); }); return s.size; };
  const hhFaseMes=(mes,fase)=>hhFaseMesG(mes,fase);
  let mEq=0, mHH=0;
  meses.forEach(m=>{ let totM=0; FS.forEach(f=>{ const v=fm[m][f]; mEq+=v*(pesos[f]||0)/100; totM+=v; }); if(totM>1) mHH+=hhMesG(m); });
  const prodMedia = mHH? mEq/mHH : 0;
  let totalEq=0, feitoEq=0;
  DB.zones.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.anulada)return; const peso=pesos[f]||0; totalEq+=z.area*peso/100; if(fd&&fd.mes) feitoEq+=z.area*peso/100; }); });
  const faltaEq=Math.max(0,totalEq-feitoEq);
  const pctFeito = totalEq>0? feitoEq/totalEq*100 : 0;
  const addDiasUteis=(base,nDias)=>{ const d=new Date(base); let restam=Math.ceil(nDias); while(restam>0){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) restam--; } return d; };
  const prev=DB.config.prevFim||{modo:'func', nFunc:5, data:''};
  let dataFim=null, diasUteis=null, nNec=null, du=null;
  if(prodMedia>0 && faltaEq>0){
    if(prev.modo==='data' && prev.data){
      const data=new Date(prev.data+'T00:00:00');
      if(!isNaN(data)){ const hoje=new Date(); hoje.setHours(0,0,0,0); du=0; const d=new Date(hoje); while(d<data){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) du++; } if(du>0) nNec=faltaEq/(du*HDIA*prodMedia); }
    } else {
      const n=Math.max(1,prev.nFunc||1);
      diasUteis=faltaEq/(n*HDIA*prodMedia);
      dataFim=addDiasUteis(new Date(),diasUteis);
    }
  }
  return {prodMedia, totalEq, feitoEq, faltaEq, pctFeito, prev, dataFim, diasUteis, nNec, du, fm, meses, pesos, FS, hhFaseMes, addDiasUteis};
}

function rPrevisao(){
  const HDIA=8, HMES=20*HDIA, FS=FASES;
  const meses=mesesAtivos();
  const pesos=pesosNorm();
  const fm={}; meses.forEach(m=>{ fm[m]={}; FS.forEach(f=>fm[m][f]=0); });
  DB.zones.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.mes&&fm[fd.mes]) fm[fd.mes][f]+=z.area; }); });
  const trabFaseMes=(mes,fase)=>{ const s=new Set(); DB.zones.forEach(z=>{ if(z.anulada)return; const fd=z.fases[fase]; if(fd&&fd.mes===mes&&fd.equipa) fd.equipa.forEach(w=>s.add(w)); }); return s.size; };
  const hhFaseMes=(mes,fase)=>hhFaseMesG(mes,fase);

  // produtividade média ponderada (total eq / total hh)
  let mEq=0, mHH=0;
  meses.forEach(m=>{ let totM=0; FS.forEach(f=>{ const v=fm[m][f]; mEq+=v*(pesos[f]||0)/100; totM+=v; }); if(totM>1) mHH+=hhMesG(m); });
  const prodMedia = mHH? mEq/mHH : 0;
  // trabalho equivalente que falta
  let totalEq=0, feitoEq=0;
  DB.zones.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases[f]; if(fd&&fd.anulada)return; const peso=pesos[f]||0; totalEq+=z.area*peso/100; if(fd&&fd.mes) feitoEq+=z.area*peso/100; }); });
  const faltaEq=Math.max(0,totalEq-feitoEq);
  const pctFeito = totalEq>0? feitoEq/totalEq*100 : 0;
  const HDIA2=8;
  const addDiasUteis=(base,nDias)=>{ const d=new Date(base); let restam=Math.ceil(nDias); while(restam>0){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) restam--; } return d; };
  const fmtData=d=>d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const prev=DB.config.prevFim||{modo:'func', nFunc:5, data:''};
  let resultado='';
  if(prodMedia<=0 || faltaEq<=0){
    resultado=`<div class="note" style="margin:0">${faltaEq<=0?'A obra já está 100% concluída (em trabalho equivalente).':'Ainda não há produtividade registada para fazer a previsão. Lança autos com equipa para a app aprender o ritmo.'}</div>`;
  } else if(prev.modo==='func'){
    const n=Math.max(1,prev.nFunc||1);
    const eqDia=n*HDIA2*prodMedia;
    const diasUteis=faltaEq/eqDia;
    const dataFim=addDiasUteis(new Date(),diasUteis);
    const fimPrev = DB.config.dataFimPrev? new Date(DB.config.dataFimPrev+'T00:00:00') : null;
    let comp='';
    if(fimPrev && !isNaN(fimPrev)){ const atras=dataFim>fimPrev; comp=`<div class="card" style="border-left:4px solid ${atras?'var(--verm)':'var(--verde)'}"><div class="k">vs Fim previsto</div><div class="v" style="font-size:18px;color:${atras?'var(--verm)':'var(--verde)'}">${atras?'⚠ atrasada':'✓ a tempo'}</div><div class="s">previsto: ${fmtData(fimPrev)}</div></div>`; }
    resultado=`<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:0">
      <div class="card" style="border-left:4px solid var(--verde)"><div class="k">Data de fim estimada</div><div class="v" style="font-size:20px;color:var(--verde)">${fmtData(dataFim)}</div><div class="s">a partir de hoje</div></div>
      <div class="card"><div class="k">Tempo de trabalho</div><div class="v" style="font-size:20px">${fmtN(diasUteis)} dias úteis</div><div class="s">≈ ${fmtN(diasUteis/20)} meses</div></div>
      <div class="card"><div class="k">Ritmo</div><div class="v" style="font-size:20px">${fmtN(eqDia)} m²-eq/dia</div><div class="s">com ${n} ${n==1?'funcionário':'funcionários'}</div></div>
      ${comp}
    </div>`;
  } else {
    const data=prev.data? new Date(prev.data+'T00:00:00'):null;
    if(!data || isNaN(data)){ resultado=`<div class="note" style="margin:0">Escolhe uma data de fim para calcular os funcionários necessários.</div>`; }
    else {
      const hoje=new Date(); hoje.setHours(0,0,0,0);
      let du=0; const d=new Date(hoje); while(d<data){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) du++; }
      if(du<=0){ resultado=`<div class="note" style="margin:0;color:var(--verm)">A data escolhida já passou ou é hoje. Escolhe uma data futura.</div>`; }
      else {
        const nNec=faltaEq/(du*HDIA2*prodMedia);
        resultado=`<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:0">
          <div class="card" style="border-left:4px solid var(--verde)"><div class="k">Funcionários necessários</div><div class="v" style="font-size:20px;color:var(--verde)">${fmtN(nNec)} ${nNec<=1?'pessoa':'pessoas'}</div><div class="s">em média, todos os dias</div></div>
          <div class="card"><div class="k">Prazo disponível</div><div class="v" style="font-size:20px">${du} dias úteis</div><div class="s">até ${fmtData(data)}</div></div>
          <div class="card" style="border-left:4px solid var(--laranja-esc)"><div class="k">Arredondado</div><div class="v" style="font-size:20px">${Math.ceil(nNec)} ${Math.ceil(nNec)==1?'pessoa':'pessoas'}</div><div class="s">para cumprir o prazo</div></div>
        </div>`;
      }
    }
  }
  let html=`<div class="big"><div class="titulo">Onde está a obra</div>
    <div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:0 0 8px">
      <div class="card"><div class="k">Trabalho feito</div><div class="v" style="font-size:22px;color:var(--verde)">${fmtN(pctFeito)}%</div><div class="s">${fmtN(feitoEq)} de ${fmtN(totalEq)} m²-eq</div></div>
      <div class="card"><div class="k">Falta fazer</div><div class="v" style="font-size:22px">${fmtN(faltaEq)} m²-eq</div><div class="s">trabalho ponderado</div></div>
      <div class="card"><div class="k">Produtividade média</div><div class="v" style="font-size:22px">${fmtN(prodMedia)}</div><div class="s">m²-eq/h-homem</div></div>
    </div>
    <div style="height:14px;background:var(--linha);border-radius:7px;overflow:hidden;margin-top:6px"><div style="height:100%;width:${Math.min(100,pctFeito)}%;background:var(--verde);border-radius:7px"></div></div>
  </div>

  <div class="big" style="border-left:4px solid var(--laranja-esc)"><div class="titulo">Calcular previsão</div>
    <div class="note" style="margin-top:0">Usa a produtividade média ponderada da equipa (<b>${fmtN(prodMedia)} m²-eq/h-homem</b>) e o trabalho que falta (<b>${fmtN(faltaEq)} m²-eq</b>). Calcula a 8 h/dia, só dias úteis (salta fins de semana).</div>
    <div class="bar" style="margin:6px 0 12px;gap:6px;flex-wrap:wrap">
      <button class="${prev.modo==='func'?'act':'sec'}" id="bPrevModoF">Tenho N funcionários → quando acaba</button>
      <button class="${prev.modo==='data'?'act':'sec'}" id="bPrevModoD">Quero acabar numa data → quantos preciso</button>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px">
      ${prev.modo==='func'
        ? `<label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600">Nº de funcionários<input type="number" step="1" min="1" id="prevNFunc" value="${prev.nFunc||5}" style="width:90px;font-size:18px;font-weight:700;padding:5px 7px"></label>`
        : `<label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600">Data de fim pretendida<input type="date" id="prevData" value="${prev.data||''}" style="width:180px;font-size:15px;padding:5px 7px"></label>`}
    </div>
    ${resultado}
    <div class="note">Estimativa orientativa: assume o mesmo ritmo médio que a equipa teve até agora. Se meteres muito mais gente do que a média histórica, o ritmo por pessoa pode baixar. Quanto mais dias marcares no Mapa de trabalho, mais fiável fica o cálculo das horas e da produtividade.</div>
  </div>`;

  return html;
}

function rResumo(){
  const FCOR=new Proxy({},{get:(t,k)=>k==='HORAS'?'#777':faseCor(k)});
  const medido = DB.zones.reduce((a,z)=>a+zonaValor(z),0) + DB.extras.reduce((a,e)=>a+e.area*e.preco,0);
  const porConcluir = DB.zones.reduce((a,z)=>a+zonaPendente(z),0);
  const totAPagar = mesesAtivos().reduce((a,mes)=>{ const c=calcMes(mes); return a+Object.values(c).reduce((x,o)=>x+o.aPagar,0); },0);
  const totPago = DB.payments.reduce((a,p)=>a+p.valor,0);
  const falta = totAPagar-totPago;
  const orcTotal=orcamentoAuto();
  const pctOrc = orcTotal? medido/orcTotal*100 : 0;
  // ---- m² de fase (cada zona tem 3 fases; conta m² por fase executada vs total, ignorando anuladas) ----
  let m2Feitos=0, m2Totais=0;
  DB.zones.forEach(z=>{ if(z.anulada) return; FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.anulada) return;            // fase anulada não conta no total
    m2Totais+=z.area;                      // fase que se faz (feita ou pendente)
    if(fd&&fd.mes) m2Feitos+=z.area;       // fase concluída
  }); });
  const pctM2 = m2Totais? m2Feitos/m2Totais*100 : 0;

  // ---- CARTÕES GRANDES: a pagar · já pago · em falta · por concluir ----
  let html=`<div class="big"><div class="titulo">Obra</div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end">
      <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600">Nome da obra</div><div style="font-size:18px;font-weight:800">${DB.config.obra||'—'}</div></div>
      <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600">Cliente</div><div style="font-size:18px;font-weight:800">${DB.config.cliente||'—'}</div></div>
      <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600">Orçamento (= total do auto)</div><div style="font-family:var(--mono);font-size:22px;font-weight:800;color:var(--laranja-esc)">${fmtEur(orcTotal)}</div></div>
    </div>
    <div class="note" style="margin-top:6px">O orçamento é calculado automaticamente: soma de todas as zonas do auto (concluído + pendente) mais as horas. Atualiza-se sozinho sempre que lanças ou alteras autos.</div>
  </div>
  <div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px">
    <div class="card" style="border-left:4px solid var(--laranja)">
      <div class="k">1 · A pagar à equipa</div>
      <div class="v" style="font-size:26px">${fmtEur(totAPagar)}</div>
      <div class="s">calculado dos autos</div>
    </div>
    <div class="card" style="border-left:4px solid var(--verde)">
      <div class="k">2 · Já pago</div>
      <div class="v pos" style="font-size:26px">${fmtEur(totPago)}</div>
      <div class="s">${totAPagar?Math.min(100,totPago/totAPagar*100).toFixed(0):0}% liquidado</div>
    </div>
    <div class="card" style="border-left:4px solid ${falta>0.5?'var(--verm)':'var(--verde)'}">
      <div class="k">3 · Em falta</div>
      <div class="v ${falta>0.5?'neg':'pos'}" style="font-size:26px">${fmtEur(falta)}</div>
      <div class="s">por pagar à equipa</div>
    </div>
    <div class="card" style="border-left:4px solid var(--ink2)">
      <div class="k">4 · Por concluir</div>
      <div class="v" style="font-size:26px">${fmtEur(porConcluir)}</div>
      <div class="s">${fmtN(m2Feitos)} / ${fmtN(m2Totais)} m² · ${pctM2.toFixed(0)}%</div>
    </div>
    <div class="card" style="border-left:4px solid #8a6d3b">
      <div class="k">5 · Retenção (${DB.config.pctRetencao||0}%)</div>
      <div class="v" style="font-size:26px;color:#8a6d3b">${fmtEur(medido-totAPagar)}</div>
      <div class="s">retido à equipa · fica na empresa</div>
    </div>
  </div>`;

  // ---- BLOCO: ESTADO DA OBRA (barra) ----
  html+=`<div class="big"><div class="titulo">Estado da obra</div>
    <div class="ledger">
      <div class="lrow"><span class="llbl">Medido em autos</span><span class="lval" style="color:var(--laranja-esc)">${fmtEur(medido)}</span></div>
      <div class="lrow"><span class="llbl">Por concluir (fases pendentes)</span><span class="lval">${fmtEur(porConcluir)}</span></div>
      <div class="lrow res"><span class="llbl">Valor total do auto</span><span class="lval">${fmtEur(orcTotal)}</span></div>
    </div>
    <div class="pbar" style="height:14px;margin-top:10px"><div class="feito" style="width:${Math.min(100,pctOrc)}%"></div><div class="pend" style="width:${Math.min(100-Math.min(100,pctOrc), porConcluir/orcTotal*100)}%"></div></div>
    <div class="note" style="margin:2px 0 0">■ medido &nbsp; ▨ pendente já identificado &nbsp; · <b>${fmtN(m2Feitos)} m²</b> de fase feitos de <b>${fmtN(m2Totais)} m²</b> a executar (${pctM2.toFixed(0)}%)</div>
  </div>`;

    const d=fdata[f]||{cm2:0,cv:0,pm2:0,pv:0};
    const tot=d.cm2+d.pm2; const pct=tot?d.cm2/tot*100:0;
    html+=`<div class="flinha">
      ${tagFase(f)}
      <div><div class="pbar" style="--cor:${FCOR[f]}"><div class="feito" style="width:${pct}%"></div><div class="pend" style="width:${100-pct}%"></div></div></div>
      <div class="fnum"><b>${pct.toFixed(0)}%</b> · ${fmtN(d.cm2)} m² feitos${d.pm2>0.01?` · <span class="neg">${fmtN(d.pm2)} m² (${fmtEur(d.pv)}) pendentes</span>`:''}</div>
    </div>`;
  });
  const hv=DB.extras.reduce((a,e)=>a+e.area*e.preco,0);
  if(hv) html+=`<div class="note">+ Horas avulsas: ${fmtEur(hv)}</div>`;
  html+=`</div>`;

  // ---- BLOCO 4: EVOLUÇÃO MENSAL ----
  const meses=mesesAtivos();
  const mdata=meses.map(mes=>{
    const med=tarefasMes(mes).reduce((a,t)=>a+t.valor,0);
    const ap=Object.values(calcMes(mes)).reduce((a,o)=>a+o.aPagar,0);
    const pg=DB.payments.filter(p=>p.mes===mes).reduce((a,p)=>a+p.valor,0);
    return {mes,med,ap,pg};
  }).filter(d=>d.med>0.01||d.pg>0.01);

  const maxMed=Math.max(...mdata.map(d=>d.med),1);
  html+=`<div class="big"><div class="titulo">Evolução mensal — medido (laranja) e pago à equipa (cinza)</div>
    <div class="mchart">${mdata.map(d=>`<div class="mcol">
      <div class="mv">${(d.med/1000).toFixed(1)}k</div>
      <div class="mb" style="height:${Math.max(4,d.med/maxMed*100)}%"><div class="mp" style="height:${d.med?Math.min(100,d.pg/d.med*100):0}%"></div></div>
      <div class="ml">${d.mes.slice(5)}/${d.mes.slice(2,4)}</div>
    </div>`).join('')}</div>
    <div class="scroll"><table><tr><th>Mês</th><th class="n">Medido (auto)</th><th class="n">A pagar equipa</th><th class="n">Pago</th><th class="n">Em falta</th><th class="n">Saldo retenção</th></tr>
    ${mdata.map(d=>{const sd=d.ap-d.pg;return `<tr><td>${mesLbl(d.mes)}</td><td class="n">${fmtEur(d.med)}</td><td class="n">${fmtEur(d.ap)}</td><td class="n">${fmtEur(d.pg)}</td><td class="n ${Math.abs(sd)>0.5?'neg':'pos'}">${fmtEur(sd)}</td><td class="n">${fmtEur(d.med-d.ap)}</td></tr>`;}).join('')}
    <tr class="tot"><td>Total</td><td class="n">${fmtEur(mdata.reduce((a,d)=>a+d.med,0))}</td><td class="n">${fmtEur(mdata.reduce((a,d)=>a+d.ap,0))}</td><td class="n">${fmtEur(mdata.reduce((a,d)=>a+d.pg,0))}</td><td class="n ${Math.abs(falta)>0.5?'neg':'pos'}">${fmtEur(falta)}</td><td class="n">${fmtEur(mdata.reduce((a,d)=>a+d.med-d.ap,0))}</td></tr>
    </table></div>
  </div>`;

  // ---- BLOCO 5: FUNCIONÁRIOS ----
  const acc={};
  meses.forEach(mes=>{ const c=calcMes(mes); Object.entries(c).forEach(([w,o])=>{ if(!acc[w])acc[w]={ap:0,pg:0}; acc[w].ap+=o.aPagar; }); });
  DB.payments.forEach(p=>{ if(!acc[p.funcionario])acc[p.funcionario]={ap:0,pg:0}; acc[p.funcionario].pg+=p.valor; });
  html+=`<div class="big"><div class="titulo">Funcionários — pago vs. a pagar (acumulado da obra)</div>`;
  Object.entries(acc).sort((a,b)=>b[1].ap-a[1].ap).forEach(([w,o])=>{
    const sd=o.ap-o.pg; const pct=o.ap?Math.min(100,o.pg/o.ap*100):0;
    html+=`<div class="wlinha">
      <b style="font-size:13px">${w}</b>
      <div><div class="pbar" style="--cor:var(--verde)"><div class="feito" style="width:${pct}%"></div></div></div>
      <div class="fnum">${fmtEur(o.pg)} / ${fmtEur(o.ap)}${Math.abs(sd)>0.5?` · <span class="neg"><b>${fmtEur(sd)}${sd<-0.5?' ⚠ pago a mais':' em falta'}</b></span>`:' · <span class="pos">✓ em dia</span>'}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function rResAuto(){
  const fmt=(n)=>fmtN(n);
  // ===== ZONAS PRONTAS (m²): uma zona só está pronta quando todas as fases ativas dela estão feitas =====
  let m2Total=0, m2Pronto=0, m2Falta=0;
  let nZonasTotal=0, nZonasProntas=0;
  DB.zones.forEach(z=>{
    if(z.anulada) return;
    let temFaseAtiva=false, todasFeitas=true;
    FASES.forEach(f=>{
      const fd=z.fases[f];
      if(fd&&fd.anulada) return;
      temFaseAtiva=true;
      if(!(fd&&fd.mes)) todasFeitas=false;
    });
    if(!temFaseAtiva) return;
    nZonasTotal++; m2Total+=z.area;
    if(todasFeitas){ nZonasProntas++; m2Pronto+=z.area; }
    else m2Falta+=z.area;
  });
  const pctGeral=m2Total?m2Pronto/m2Total*100:0;

  // ===== PROGRESSO PONDERADO (pesos das fases): cada zona conta a % de peso das fases feitas =====
  const pesos=pesosNorm(); // {F1:%, F2:%, ...} normalizado a 100
  let m2Ponderado=0; // m² equivalentes concluídos pelo peso
  DB.zones.forEach(z=>{
    if(z.anulada) return;
    let temFaseAtiva=false, pctZona=0;
    FASES.forEach(f=>{
      const fd=z.fases[f];
      if(fd&&fd.anulada) return;
      temFaseAtiva=true;
      if(fd&&fd.mes) pctZona+=pesos[f]||0; // soma o peso desta fase concluída
    });
    if(!temFaseAtiva) return;
    m2Ponderado += z.area*(pctZona/100);
  });
  const pctPonderado = m2Total ? m2Ponderado/m2Total*100 : 0;

  // ===== por fase (m²): concluído e em falta =====
  const fdata={}; FASES.forEach(f=>fdata[f]={con:0,falta:0});
  DB.zones.forEach(z=>{ if(z.anulada) return; FASES.forEach(f=>{
    const fd=z.fases[f];
    if(fd&&fd.anulada) return;
    if(fd&&fd.mes) fdata[f].con+=z.area; else fdata[f].falta+=z.area;
  }); });

  // ===== mês a mês: uma zona conta no mês em que ficou PRONTA (última fase) =====
  const mesM2={};
  DB.zones.forEach(z=>{
    if(z.anulada) return;
    let temFaseAtiva=false, todasFeitas=true, ultimoMes='';
    FASES.forEach(f=>{
      const fd=z.fases[f];
      if(fd&&fd.anulada) return;
      temFaseAtiva=true;
      if(fd&&fd.mes){ if(fd.mes>ultimoMes) ultimoMes=fd.mes; }
      else todasFeitas=false;
    });
    if(temFaseAtiva && todasFeitas && ultimoMes){ mesM2[ultimoMes]=(mesM2[ultimoMes]||0)+z.area; }
  });
  const mesesM2=Object.keys(mesM2).sort();
  const maxMes=Math.max(...mesesM2.map(m=>mesM2[m]),1);

  let html=`<div style="background:${pctPonderado>=100?'var(--verde)':'var(--laranja)'};color:#fff;border-radius:10px;padding:16px 22px;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:13px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;opacity:.9">Progresso da obra (ponderado pelas fases)</div>
      <div style="font-size:14px;opacity:.85;margin-top:2px">${fmt(m2Ponderado)} de ${fmt(m2Total)} m² equivalentes · ${nZonasProntas} de ${nZonasTotal} zonas 100% prontas</div>
    </div>
    <div style="font-family:var(--mono);font-size:34px;font-weight:800">${pctPonderado.toFixed(0)}%</div>
  </div>`;

  // pesos das fases (info)
  html+=`<div class="note" style="margin:0 0 14px">Progresso ponderado: cada fase vale uma % do total. ${FASES.map(f=>`${tagFase(f)} <b>${(pesos[f]||0).toFixed(0)}%</b>`).join(' · ')}. Edita os pesos na <b>Configuração</b>.</div>`;

  // cartões de totais
  html+=`<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:14px">
    <div class="card" style="border-left:4px solid var(--ink2)"><div class="k">m² totais</div><div class="v" style="font-size:24px">${fmt(m2Total)}</div><div class="s">${nZonasTotal} zonas</div></div>
    <div class="card" style="border-left:4px solid var(--laranja)"><div class="k">Progresso ponderado</div><div class="v" style="font-size:24px;color:var(--laranja-esc)">${pctPonderado.toFixed(0)}%</div><div class="s">${fmt(m2Ponderado)} m² equivalentes</div></div>
    <div class="card" style="border-left:4px solid var(--verde)"><div class="k">Zonas 100% prontas</div><div class="v pos" style="font-size:24px">${nZonasProntas} de ${nZonasTotal}</div><div class="s">${fmt(m2Pronto)} m² · todas as fases feitas</div></div>
  </div>`;

  // por fase (m²)
  const totFaseCon=FASES.reduce((a,f)=>a+fdata[f].con,0);
  const totFaseFalta=FASES.reduce((a,f)=>a+fdata[f].falta,0);
  const totFaseTot=totFaseCon+totFaseFalta;
  const pctFase=totFaseTot?totFaseCon/totFaseTot*100:0;
  html+=`<div class="big"><div class="titulo">m² por fase</div>
    <div class="scroll"><table style="font-size:13px"><tr><th>Fase</th><th class="n">Concluídos</th><th class="n">Em falta</th><th class="n">Total</th><th class="n">%</th></tr>
    ${FASES.map(f=>{ const d=fdata[f]; const tot=d.con+d.falta; const pct=tot?d.con/tot*100:0; return `<tr><td>${tagFase(f)}</td><td class="n pos">${fmt(d.con)}</td><td class="n" style="color:var(--laranja-esc)">${fmt(d.falta)}</td><td class="n">${fmt(tot)}</td><td class="n"><b>${pct.toFixed(0)}%</b></td></tr>`; }).join('')}
    <tr class="tot"><td>Total</td><td class="n pos">${fmt(totFaseCon)}</td><td class="n" style="color:var(--laranja-esc)">${fmt(totFaseFalta)}</td><td class="n">${fmt(totFaseTot)}</td><td class="n">${pctFase.toFixed(0)}%</td></tr>
    </table></div>
    <div class="note" style="margin:0">Esta tabela conta <b>cada fase separadamente</b>. Os "m² concluídos" no topo só contam uma zona quando <b>todas as fases dela</b> estão prontas.</div>
  </div>`;

  // progresso por fase (barras)
  html+=`<div class="big"><div class="titulo">Progresso por fase</div>`;
  FASES.forEach(f=>{
    const d=fdata[f]; const tot=d.con+d.falta; const pct=tot?d.con/tot*100:0;
    html+=`<div class="flinha">
      ${tagFase(f)}
      <div><div class="pbar" style="--cor:${faseCor(f)}"><div class="feito" style="width:${pct}%"></div><div class="pend" style="width:${100-pct}%"></div></div></div>
      <div class="fnum"><b>${pct.toFixed(0)}%</b> · ${fmt(d.con)} m² feitos${d.falta>0.01?` · <span class="neg">${fmt(d.falta)} m² em falta</span>`:''}</div>
    </div>`;
  });
  html+=`</div>`;

  // mês a mês
  html+=`<div class="big"><div class="titulo">Zonas concluídas mês a mês (m²)</div>`;
  if(mesesM2.length){
    html+=`<div class="mchart">${mesesM2.map(m=>`<div class="mcol">
      <div class="mv">${fmt(mesM2[m])}</div>
      <div class="mb" style="height:${Math.max(4,mesM2[m]/maxMes*100)}%;background:var(--verde)"></div>
      <div class="ml">${m.slice(5)}/${m.slice(2,4)}</div>
    </div>`).join('')}</div>
    <div class="scroll"><table style="font-size:13px"><tr><th>Mês</th><th class="n">m² concluídos</th><th class="n">Acumulado</th></tr>
    ${(()=>{ let ac=0; return mesesM2.map(m=>{ ac+=mesM2[m]; return `<tr><td>${mesLbl(m)}</td><td class="n pos">${fmt(mesM2[m])}</td><td class="n">${fmt(ac)}</td></tr>`; }).join(''); })()}
    <tr class="tot"><td>Total</td><td class="n pos">${fmt(m2Pronto)}</td><td class="n">${fmt(m2Pronto)}</td></tr>
    </table></div>`;
  } else {
    html+=`<div class="note" style="margin:0">Ainda não há fases concluídas com data de auto.</div>`;
  }
  html+=`</div>`;
  return html;
}

    const anulTxt = FASES.filter(f=>anFase[f]>0.01).map(f=>`${faseNome(f)} ${fmtN(anFase[f])} m²`).join(' · ');
