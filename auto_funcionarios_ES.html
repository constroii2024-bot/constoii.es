    const mesCompleto = zs.length>0 && zs.every(z=> z.anulada || FASES.every(f=>{ const fd=z.fases[f]; return fd && (fd.anulada || fd.mes); }));
    const bgMes = mesCompleto ? '#D6F0E2' : '#F0F7F3';
    html+=`<tr class="gmes" data-gmes="${mk}" style="cursor:pointer;background:${bgMes}"><td colspan="${3+FASES.length}" style="font-weight:800"><span style="display:inline-block;width:14px">${fechado?'▶':'▼'}</span>${mesCompleto?'<span style="color:var(--verde)">✓ </span>':''}${lblMes} <span style="font-weight:500;color:var(--ink2);font-size:12px">· ${zs.length} ${zs.length==1?'zona':'zonas'} · ${fmtN(gA)} m²${mesCompleto?' · <span style="color:var(--verde);font-weight:700">concluído</span>':''}</span>${fasesTxt?`<div style="font-weight:500;font-size:11px;margin-top:2px;padding-left:14px">${fasesTxt}</div>`:''}${anulTxt?`<div style="font-weight:500;font-size:11px;margin-top:1px;padding-left:14px;color:var(--ink2)">⊘ Anuladas: ${anulTxt}</div>`:''}</td><td class="n"><b>${fmtEur(gV)}</b></td><td class="n ${gP>0?'neg':''}">${gP>0?fmtEur(gP):'—'}</td><td></td></tr>`;
    if(!fechado){
      zs.forEach(z=>{
        const v=zonaValor(z), p=zonaPendente(z);
        const cb = filtroFase==='PEND' ? `<input type="checkbox" class="lbSel" data-z="${z.id}" style="margin-right:6px">` : '';
        const ri = z.anulada ? 'opacity:.5;text-decoration:line-through' : '';
        const btnAnul = z.anulada
          ? `<button class="mini" data-toggle-zona="${z.id}" title="Reativar linha" style="color:var(--verde)">↺</button>`
          : `<button class="mini" data-toggle-zona="${z.id}" title="Anular linha inteira" style="color:var(--ink2)">⊘</button>`;
        html+=`<tr style="${ri}"><td style="padding-left:18px">${cb}${z.desc}${z.anulada?' <span style="font-size:9px;color:var(--verm);text-decoration:none">ANULADA</span>':''}</td><td style="font-size:12px;font-family:var(--mono)">${z.dataAuto||'—'}</td><td class="n">${fmtN(z.area)}</td>
        ${FASES.map(f=>`<td>${z.anulada?'—':chip(z,f)}</td>`).join('')}
        <td class="n"><b>${fmtEur(v)}</b></td><td class="n ${p>0?'neg':''}">${p>0?fmtEur(p):'—'}</td>
        <td style="text-decoration:none">${btnAnul}<button class="mini" data-ed="${z.id}">✏️</button><button class="mini" data-del="${z.id}">🗑️</button></td></tr>`;
      });
    }
    sA+=gA; sV+=gV; sP+=gP;
  });
  html+=`<tr class="tot"><td colspan="2">Total (${list.length} zonas)</td><td class="n">${fmtN(sA)}</td><td colspan="${FASES.length}"></td><td class="n">${fmtEur(sV)}</td><td class="n">${fmtEur(sP)}</td><td></td></tr></table></div>`;
  html+=`<h2>Horas avulsas</h2><div class="form"><div class="row">
    <label>Descrição<input type="text" id="hDesc" placeholder="Horas mês junho" style="width:200px"></label>
    <label>Horas<input type="number" step="0.5" id="hQtd" style="width:80px"></label>
    <label>Preço €/h<input type="number" step="0.01" id="hPreco" value="${DB.config.precos.HORAS}" style="width:80px"></label>
    <label>Mês<input type="text" id="hMes" value="${mesAtual()}" style="width:95px"></label>
    <label>&nbsp;<button class="act" id="bH">+ Registar horas</button></label>
  </div>
  <div class="note">Equipa:</div>
  <div class="chk" id="hEq">${DB.workers.map(w=>`<label><input type="checkbox" value="${w.nome}">${w.nome}</label>`).join('')}</div></div>
  <div class="scroll"><table><tr><th>Mês</th><th>Descrição</th><th class="n">Horas</th><th class="n">€/h</th><th class="n">Valor</th><th>Equipa</th><th></th></tr>
  ${DB.extras.map(e=>`<tr><td style="font-family:var(--mono);font-size:12px">${e.mes}</td><td>${e.desc}</td><td class="n">${fmtN(e.area)}</td><td class="n">${fmtN(e.preco)}</td><td class="n"><b>${fmtEur(e.area*e.preco)}</b></td><td style="font-size:11px">${(e.equipa||[]).join(', ')}</td><td><button class="mini" data-delh="${e.id}">🗑️</button></td></tr>`).join('')||'<tr><td colspan="7" style="color:var(--ink2)">Sem registos de horas.</td></tr>'}
  </table></div>`;
  return html;
}

function rPag(){
  const meses = mesesAtivos();
  if(!meses.length) return `<div class="big"><div class="note">Ainda não há autos com fases concluídas. Adiciona zonas e marca as fases na aba <b>Auto de medição</b> para calcular os pagamentos à equipa.</div></div>`;
  if(!pagMes || !meses.includes(pagMes)) pagMes = meses[meses.length-1];
  const calc = calcMes(pagMes);
  const pagos = pagosMes(pagMes);
  const cfg=DB.config;
  // indicadores de topo (como no Excel)
  const medidoMes = tarefasMes(pagMes).reduce((a,t)=>a+t.valor,0);
  const pagoCalcMes = Object.values(calc).reduce((a,o)=>a+o.aPagar,0);
  const pagoRealMes = Object.values(pagos).reduce((a,v)=>a+v,0);
  const porPagarMes = pagoCalcMes - pagoRealMes;
  const retencaoMes = medidoMes - pagoCalcMes;
  let porPagarAcum=0, retAcum=0;
  meses.filter(m=>m<=pagMes).forEach(m=>{
    const med = tarefasMes(m).reduce((a,t)=>a+t.valor,0);
    const pc = Object.values(calcMes(m)).reduce((a,o)=>a+o.aPagar,0);
    const pr = Object.values(pagosMes(m)).reduce((a,v)=>a+v,0);
    porPagarAcum += pc - pr;
    retAcum += med - pc;
  });
  let html=`<div class="bar"><b>Mês:</b><select id="pMes">${meses.map(m=>`<option ${pagMes===m?'selected':''} value="${m}">${mesLbl(m)}</option>`).join('')}</select></div>`;
  html+=`<div class="cards">
    <div class="card"><div class="k">A pagar à equipa (mês)</div><div class="v lar">${fmtEur(pagoCalcMes)}</div><div class="s">após ajustes e retenção</div></div>
    <div class="card"><div class="k">Já pago (mês)</div><div class="v pos">${fmtEur(pagoRealMes)}</div></div>
    <div class="card"><div class="k">Por pagar à equipa (mês)</div><div class="v ${porPagarMes>0.5?'neg':'pos'}">${fmtEur(porPagarMes)}</div></div>
    <div class="card"><div class="k">Por pagar acumulado</div><div class="v ${porPagarAcum>0.5?'neg':'pos'}">${fmtEur(porPagarAcum)}</div><div class="s">até ${mesLbl(pagMes)}</div></div>
    <div class="card"><div class="k">Retenção ${cfg.pctRetencao}% acumulada</div><div class="v lar">${fmtEur(retAcum)}</div><div class="s">fica na empresa</div></div>
  </div>`;
  html+=`<h2 style="font-size:12.5px;color:var(--ink2)">Valor a pagar — ${mesLbl(pagMes)}</h2>
  <div class="note">Divisão por tarefas em partes iguais · Servente −${cfg.pctServente}% (redistribuído) · Chefe +${cfg.pctChefe}% · Retenção ${cfg.pctRetencao}% · Podes mudar a função de cada um aqui — o cálculo atualiza logo.</div>`;
  let tA=0,tP=0;
  const tpf=trabalhoPorFunc(pagMes);
  const allW = new Set([...Object.keys(calc), ...Object.keys(pagos)]);
  html+=`<div class="scroll"><table style="font-size:12.5px"><tr><th>Funcionário</th><th>Função</th><th>m² da sua parte</th><th class="n">A pagar</th><th class="n">Total pago</th><th>Situação do mês</th><th class="n">Saldo Obra</th><th></th></tr>`;
  [...allW].sort((a,b)=>((calc[b]&&calc[b].aPagar)||0)-((calc[a]&&calc[a].aPagar)||0)).forEach(w=>{
    const o = calc[w]||{base:0,ajServ:0,redistrib:0,bonusChefe:0,acertoChefe:0,retencao:0,aPagar:0,role:(DB.roles[pagMes]||{})[w]||'—'};
    const pg = pagos[w]||0; tA+=o.aPagar; tP+=pg; const sd=o.aPagar-pg;
    let estado='<span class="estado ok" style="font-size:10px">✓ em dia</span>';
    if(sd>0.5) estado=`<span class="estado falta" style="font-size:10px">falta ${fmtEur(sd)}</span>`;
    else if(sd<-0.5) estado=`<span class="estado mais" style="font-size:10px">⚠ a mais ${fmtEur(-sd)}</span>`;
    const calcTxt=`Base ${fmtN(o.base)}${o.ajServ?' · Aj.serv '+fmtN(o.ajServ):''}${o.redistrib?' · Redistr +'+fmtN(o.redistrib):''}${o.bonusChefe?' · Bónus chefe +'+fmtN(o.bonusChefe):''}${o.acertoChefe?' · Acerto '+fmtN(o.acertoChefe):''} · Retenção ${fmtN(o.retencao)}${o.descFaltas?' · Faltas '+o.nFaltas+'d −'+fmtN(o.descFaltas):''}${o.addFerias?' · Férias '+o.nFerias+'d +'+fmtN(o.addFerias):''}`;
    html+=`<tr>
      <td><details style="display:inline-block"><summary style="cursor:pointer;list-style:none"><b>${w}</b></summary><div style="font-family:var(--mono);font-size:10.5px;color:var(--ink2);padding-top:3px">${calcTxt}</div></details></td>
      <td><select class="pgRole" data-w="${w}" style="font-size:10.5px;padding:2px">${['CHEFE','OFICIAL','SERVENTE'].map(x=>`<option ${o.role===x?'selected':''}>${x}</option>`).join('')}</select></td>
      <td style="font-size:11px">${(()=>{ const t=tpf[w]; if(!t) return '<span style="color:var(--ink2)">—</span>';
        const pr=trabalhoMes(pagMes);
        const ps=[]; FASES.forEach(f=>{ if(t[f]&&t[f].m2>0.001) ps.push(`${tagFase(f)} ${fmtN(t[f].m2)} m² × ${fmtN(pr[f].preco)} €`); });
        if(t.HORAS.h>0.001) ps.push(`<span class="tag HORAS" style="font-size:9px;padding:0 4px">HORAS</span> ${fmtN(t.HORAS.h)} h × ${fmtN(pr.HORAS.preco)} €`);
        return ps.join('<br>')||'<span style="color:var(--ink2)">—</span>'; })()}</td>
      <td class="n"><b>${fmtEur(o.aPagar)}</b></td>
      <td class="n"><input type="number" step="0.01" class="pgEdit" data-w="${w}" value="${pg.toFixed(2)}" style="width:90px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--verde);font-weight:700"></td>
      <td>${estado}</td>
      <td class="n">${(()=>{ const dispW=disponivel(w); return `<b class="${dispW>0.5?'neg':'pos'}">${fmtEur(dispW)}</b><br><span style="font-size:9.5px;color:var(--ink2)">por pagar da obra</span>`; })()}</td>
      <td><button class="act" style="padding:3px 10px;font-size:11.5px" data-pgw="${w}">${pg>0.005?'Atualizar':(sd>0.5?'✓ Pagar':'Registar')}</button>${sd>0.5?` <button class="sec" style="padding:3px 8px;font-size:11px" data-fillfull="${w}|${o.aPagar.toFixed(2)}" title="Pôr o valor total a pagar">tudo</button>`:''}</td>
    </tr>`;
  });
  const tmTot=trabalhoMes(pagMes);
  const trabCell=(()=>{ const ps=[]; FASES.forEach(f=>{ if(tmTot[f]&&tmTot[f].m2>0.001) ps.push(`${tagFase(f)} ${fmtN(tmTot[f].m2)} m² × ${fmtN(tmTot[f].preco)} € = <b>${fmtEur(tmTot[f].v)}</b>`); }); if(tmTot.HORAS.h>0.001) ps.push(`<span class="tag HORAS" style="font-size:9px;padding:0 4px">HORAS</span> ${fmtN(tmTot.HORAS.h)} h × ${fmtN(tmTot.HORAS.preco)} € = <b>${fmtEur(tmTot.HORAS.v)}</b>`); return ps.join('<br>')||'—'; })();
  const dispTot=[...allW].reduce((a,w)=>a+Math.max(0,disponivel(w)),0);
  html+=`<tr class="tot"><td colspan="2">Total do mês</td><td style="font-size:11px">${trabCell}</td><td class="n">${fmtEur(tA)}</td><td class="n">${fmtEur(tP)}</td><td class="${Math.abs(tA-tP)>0.5?'neg':'pos'}"><b>${tA-tP>0.5?'Falta '+fmtEur(tA-tP):(tA-tP<-0.5?'+'+fmtEur(tP-tA):'✓ pago')}</b></td><td class="n neg"><b>${fmtEur(dispTot)}</b></td><td></td></tr></table></div>
  <div class="note">Toca no nome para ver o detalhe do cálculo. ⚠ O total pago a cada um nunca ultrapassa o valor dos autos. <b>Editas o valor na coluna Pago e carregas em Pagar/Atualizar</b> (ou Enter). Podes corrigir depois — basta mudar o número e atualizar.</div>`;
  const regs = DB.payments.filter(p=>p.mes===pagMes);
  html+=`<h2>Pagamentos registados — ${mesLbl(pagMes)}</h2><div class="scroll"><table><tr><th>Funcionário</th><th class="n">Valor</th><th>Data</th><th>Nota</th><th></th></tr>`;
  regs.forEach(p=>{ html+=`<tr><td><b>${nomeComApelido(p.funcionario)}</b></td><td class="n">${fmtEur(p.valor)}</td><td>${p.data||'—'}</td><td style="font-size:12px;color:var(--ink2)">${p.nota||''}</td><td><button class="mini" data-delpg="${p.id}">🗑️</button></td></tr>`; });
  if(!regs.length) html+=`<tr><td colspan="5" style="color:var(--ink2)">Sem pagamentos registados neste mês.</td></tr>`;
  html+=`</table></div>`;
  return html;
}

function equipList(){ if(!STORE.equipamentos) STORE.equipamentos=[]; return STORE.equipamentos; }
function equipDias(e){ if(!e.de||!e.ate) return 0; const d1=new Date(e.de+'T00:00:00'), d2=new Date(e.ate+'T00:00:00'); if(isNaN(d1)||isNaN(d2)) return 0; const d=Math.round((d2-d1)/86400000)+1; return d>0?d:0; }
function equipCusto(e){ const q=e.qtd||1; return (e.valor||0)*q; }
const EQ_ESTADOS=['Em obra','Disponível','Devolvido','Avariado'];
function rEquip(){
  const lista=equipList();
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const fmtD=s=>{ if(!s) return '—'; const d=new Date(s+'T00:00:00'); return isNaN(d)?'—':d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'2-digit'}); };
  let custoTotal=0, qtdTotal=0;
  lista.forEach(e=>{ custoTotal+=equipCusto(e); qtdTotal+=(e.qtd||1); });
  const emObra=lista.filter(e=>e.estado==='Em obra').length;
  // repartição do custo total pelas obras — mês a mês, cada equipamento ao longo dos meses que dura
  const porObraEq={}; STORE.obras.forEach(o=>porObraEq[o.id]=0);
  lista.forEach(e=>{
    const custo=equipCusto(e);
    const mi=(e.de||'').slice(0,7), mf=(e.ate||'').slice(0,7)||mi;
    if(custo>0 && mi){ const r=reparteCustoMensal(custo, mi, mf, null, false); Object.keys(r).forEach(id=>{ if(porObraEq[id]!=null) porObraEq[id]+=r[id]; }); }
  });
  const trabObras={}; let trabTot=0;
  STORE.obras.forEach(o=>{ trabObras[o.id]=trabalhoObra(o.db); trabTot+=trabObras[o.id]; });
  const nomesResp=todosTrabalhadores();

  let html=`<div class="big"><div class="titulo">Equipamentos (partilhados entre obras)</div>
    <div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:0 0 8px">
      <div class="card"><div class="k">Equipamentos</div><div class="v" style="font-size:22px">${lista.length}</div><div class="s">${qtdTotal} unidades</div></div>
      <div class="card" style="border-left:4px solid var(--verde)"><div class="k">Custo total</div><div class="v" style="font-size:22px;color:var(--verde)">${fmtEur(custoTotal)}</div></div>
      <div class="card"><div class="k">Em obra agora</div><div class="v" style="font-size:22px">${emObra}</div><div class="s">de ${lista.length} registos</div></div>
    </div>
  </div>

  <div class="big"><div class="titulo">Adicionar equipamento</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Nome<input type="text" id="eqNome" placeholder="ex: Andaime fachada" style="width:200px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Qtd<input type="number" id="eqQtd" value="1" min="1" style="width:70px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">De<input type="date" id="eqDe" style="width:150px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Até<input type="date" id="eqAte" style="width:150px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Estado<select id="eqEstado" style="width:130px">${EQ_ESTADOS.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Responsável<select id="eqResp" style="width:150px"><option value="">— ninguém —</option>${nomesResp.map(n=>`<option value="${n}">${n}</option>`).join('')}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Valor de compra €<input type="number" id="eqValor" value="0" step="0.01" style="width:120px"></label>
      <button class="act" id="bEqAdd">+ Adicionar</button>
    </div>
    <div class="note">O custo total de cada equipamento é o valor de compra × quantidade. Esse custo espalha-se pelos meses entre as datas De e Até, e em cada mês é repartido pelas obras conforme os m² feitos nesse mês.</div>
  </div>

  <div class="big"><div class="titulo">Lista de equipamentos</div>`;
  if(!lista.length){
    html+=`<div class="note" style="margin:0">Ainda não há equipamentos registados. Usa o formulário acima para adicionar.</div>`;
  } else {
    html+=`<div class="scroll"><table style="font-size:12.5px"><tr><th>Equipamento</th><th class="n">Qtd</th><th>De</th><th>Até</th><th class="n">Dias</th><th>Estado</th><th>Custo</th><th class="n">Total</th><th></th></tr>`;
    lista.forEach(e=>{
      const dias=equipDias(e), custo=equipCusto(e);
      const acabaBreve = e.ate && e.estado==='Em obra' && (()=>{ const d=new Date(e.ate+'T00:00:00'); const dd=Math.round((d-hoje)/86400000); return dd>=0&&dd<=7; })();
      const estCor = e.estado==='Em obra'?'var(--verde)': e.estado==='Avariado'?'var(--verm)': e.estado==='Devolvido'?'var(--ink2)':'var(--laranja-esc)';
      html+=`<tr>
        <td><b>${e.nome||'(sem nome)'}</b>${acabaBreve?' <span style="font-size:9px;color:var(--laranja-esc);font-weight:700">⏰ acaba breve</span>':''}</td>
        <td class="n">${e.qtd||1}</td>
        <td style="font-family:var(--mono);font-size:11px">${fmtD(e.de)}</td>
        <td style="font-family:var(--mono);font-size:11px">${fmtD(e.ate)}</td>
        <td class="n">${dias||'—'}</td>
        <td><span style="color:${estCor};font-weight:600">${e.estado||'—'}</span>${e.resp?` <span style="color:var(--ink2);font-weight:500">— ${e.resp}</span>`:''}</td>
        <td style="font-size:11px">${fmtEur(e.valor||0)} ×${e.qtd||1}</td>
        <td class="n"><b>${fmtEur(custo)}</b></td>
        <td style="white-space:nowrap"><button class="mini" data-eqest="${e.id}" title="Mudar estado">⟳</button><button class="mini" data-eqresp="${e.id}" title="Mudar responsável">👤</button><button class="mini" data-eqdel="${e.id}" style="color:var(--verm)">🗑️</button></td>
      </tr>`;
    });
    html+=`<tr class="tot"><td>Total (${lista.length})</td><td class="n">${qtdTotal}</td><td colspan="4"></td><td></td><td class="n">${fmtEur(custoTotal)}</td><td></td></tr></table></div>`;
  }
  html+=`</div>`;
  // repartição por obra (mês a mês, conforme os meses que cada equipamento durou)
  if(custoTotal>0){
    html+=`<div class="big"><div class="titulo">Quanto cabe a cada obra</div>
      <div class="scroll"><table style="font-size:12.5px"><tr><th>Obra</th><th class="n">Equipamentos</th></tr>
      ${STORE.obras.map(o=>`<tr><td><b>${o.nome}</b></td><td class="n"><b>${fmtEur(porObraEq[o.id]||0)}</b></td></tr>`).join('')}
      <tr class="tot"><td>Total</td><td class="n">${fmtEur(custoTotal)}</td></tr>
      </table></div>
      <div class="note">Cada equipamento espalha o seu custo pelos meses entre as datas De e Até, e em cada mês reparte pelas obras conforme os m² feitos nesse mês.</div></div>`;
  }
  return html;
}

function rEquipa(){
  const meses = mesesAtivos();
  const ultMes = meses[meses.length-1];
  let html='';
  // Se a obra tem zonas mas não tem equipa, é provável que os dados se tenham perdido — oferecer recarregar
  if((!DB.workers||!DB.workers.length) && DB.zones && DB.zones.length){
    html+=`<div class="big" style="border-left:4px solid var(--verm);background:#FDECEA">
      <div class="titulo" style="color:var(--verm)">⚠ Esta obra tem ${DB.zones.length} zonas mas nenhum funcionário</div>

  if(!STORE.vencMes || !meses.includes(STORE.vencMes)) STORE.vencMes = meses.length? meses[meses.length-1] : new Date().toISOString().slice(0,7);
  const ym=STORE.vencMes;

  // sub-abas
  const sub = STORE.vencSub==='calculo' ? 'calculo' : 'func';
  const subNav=`<div style="display:flex;gap:6px;margin-bottom:14px">

    <button class="vSubBtn" data-vsub="calculo" style="border:none;padding:8px 18px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;background:${sub==='calculo'?'#2B5470':'#E8EDE9'};color:${sub==='calculo'?'#fff':'var(--ink2)'}">💰 Vencimentos do mês</button>
  </div>`;

  // secção de gestão da lista global de funcionários
  const gestao=`<div class="big"><div class="titulo">Funcionários (lista global)</div>
    <div class="note" style="margin-top:0">Adiciona aqui todos os funcionários. Depois, em cada obra (aba <b>Pagamentos</b>), escolhes quais dedicas a essa obra — o mesmo funcionário pode estar em várias obras.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin:8px 0">
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Nome do funcionário<input type="text" id="vNovoNome" placeholder="ex: JOÃO SILVA" style="width:220px;text-transform:uppercase"></label>
      <button class="act" id="bVNovo">+ Adicionar funcionário</button>
    </div>
    ${mestre.length? `<div class="scroll"><table style="font-size:12.5px"><tr><th>Funcionário</th><th>Dedicado a (obras)</th><th></th></tr>
      ${mestre.slice().sort().map(n=>{ const obs=obrasDoFuncionario(n); return `<tr><td><b>${nomeComApelido(n)}</b></td><td style="font-size:11px;color:var(--ink2)">${obs.length? obs.map(o=>o.nome).join(', '):'<span style="color:var(--laranja-esc)">— nenhuma obra —</span>'}</td><td style="white-space:nowrap"><button class="mini" data-vape="${n}" title="Apelido / apontamento">🏷️</button><button class="mini" data-vedit="${n}" title="Editar nome">✏️</button><button class="mini" data-vdel="${n}" style="color:var(--verm)" title="Remover da lista global">🗑️</button></td></tr>`; }).join('')}
    </table></div>`:'<div class="note" style="margin:0">Ainda não há funcionários. Adiciona o primeiro acima.</div>'}
  </div>`;

  // SUB-ABA FUNCIONÁRIOS

  if(!nomes.length){
    return subNav + `<div class="big"><div class="titulo">Vencimentos</div><div class="note" style="margin:0">Ainda não há funcionários. Vai à sub-aba <b>Funcionários</b> e adiciona-os primeiro.</div></div>`;
  }

  // calcular vencimento de cada funcionário no mês
  const linhas = nomes.map(n=>vencimentoMes(n, ym)).filter(l=>l.ganho>0.005 || l.nFaltas>0 || l.nFerias>0);
  const totGanho=linhas.reduce((a,l)=>a+l.ganho,0);
  const totDesc=linhas.reduce((a,l)=>a+l.descFaltas,0);
  const totFer=linhas.reduce((a,l)=>a+l.addFerias,0);
  const totFinal=linhas.reduce((a,l)=>a+l.total,0);
  const vDiaFer=baseFerias()/30, vDiaFal=baseFaltas()/30;

  // obras onde cada funcionário trabalhou nesse mês (para a coluna "obras")
  const obrasDoFunc=(nome)=>{ const arr=[]; STORE.obras.forEach(o=>{ const dbAnt=DB; DB=o.db; try{ const c=calcMes(ym); if(c[nome]&&c[nome].aPagar>0.005) arr.push(o.nome); }catch(e){} DB=dbAnt; }); return arr; };

  let html=subNav+`<div class="big"><div class="titulo">Vencimentos — ${mesLbl(ym)}</div>
    <div class="note" style="margin-top:0">Junta o que cada funcionário ganha em <b>todas as obras</b> nesse mês. As <b>faltas</b> descontam ${fmtEur(vDiaFal)}/dia (${fmtEur(baseFaltas())}÷30) e as <b>férias</b> somam ${fmtEur(vDiaFer)}/dia (${fmtEur(baseFerias())}÷30), conforme o Mapa de trabalho de cada obra.</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0">
      <span style="font-size:12px;color:var(--ink2);font-weight:600">Mês:</span>
      <select id="vMes" style="padding:6px 10px;border-radius:6px">${meses.map(m=>`<option value="${m}"${m===ym?' selected':''}>${mesLbl(m)}</option>`).join('')}</select>
    </div>
    <div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px">
      <div class="card"><div class="k">Ganho nas obras</div><div class="v" style="font-size:20px">${fmtEur(totGanho)}</div></div>
      <div class="card" style="border-left:4px solid var(--verm)"><div class="k">Desconto faltas</div><div class="v" style="font-size:20px;color:var(--verm)">−${fmtEur(totDesc)}</div></div>
      <div class="card" style="border-left:4px solid var(--verde)"><div class="k">Férias (+)</div><div class="v" style="font-size:20px;color:var(--verde)">+${fmtEur(totFer)}</div></div>
      <div class="card" style="border-left:4px solid var(--laranja-esc)"><div class="k">Total a pagar</div><div class="v" style="font-size:20px;color:var(--laranja-esc)">${fmtEur(totFinal)}</div></div>
    </div>
  </div>

  <div class="big"><div class="titulo">Por funcionário</div>
    <div class="scroll"><table style="font-size:12.5px">
      <tr><th>Funcionário</th><th>Obras (mês)</th><th class="n">Ganho obras</th><th class="n">Faltas (−${fmtEur(vDiaFal)}/dia)</th><th class="n">Férias (+${fmtEur(vDiaFer)}/dia)</th><th class="n">A pagar</th></tr>
      ${linhas.sort((a,b)=>b.total-a.total).map(l=>{
        const obras=obrasDoFunc(l.nome);
        const obrasTxt = obras.length? (obras.length===1? obras[0] : obras.length+' obras') : '—';
        return `<tr>
          <td><b>${l.nome}</b></td>
          <td style="font-size:11px;color:var(--ink2)" title="${obras.join(', ')}">${obrasTxt}</td>
          <td class="n">${fmtEur(l.ganho)}</td>
          <td class="n">${l.nFaltas? `<span style="color:var(--verm)">${l.nFaltas}d −${fmtEur(l.descFaltas)}</span>`:'—'}</td>
          <td class="n">${l.nFerias? `<span style="color:var(--verde)">${l.nFerias}d +${fmtEur(l.addFerias)}</span>`:'—'}</td>
          <td class="n"><b>${fmtEur(l.total)}</b></td>
        </tr>`;
      }).join('')}
      <tr class="tot"><td colspan="2">Total (${linhas.length})</td><td class="n">${fmtEur(totGanho)}</td><td class="n" style="color:var(--verm)">−${fmtEur(totDesc)}</td><td class="n" style="color:var(--verde)">+${fmtEur(totFer)}</td><td class="n">${fmtEur(totFinal)}</td></tr>
    </table></div>
    <div class="note">O "ganho nas obras" é a repartição do valor do trabalho que já calculas em cada obra. Faltas e férias são contadas a partir do Mapa de trabalho (só dias úteis).</div>
  </div>

  <div class="big"><div class="titulo">Valores de cálculo (iguais para todos)</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Base FÉRIAS (€/mês)<input type="number" step="0.01" min="0" id="vBaseFer" value="${baseFerias()}" style="width:140px"></label>
      <span style="color:var(--ink2);font-size:13px;align-self:center">÷ 30 = <b>${fmtEur(vDiaFer)}</b>/dia somado por cada dia de férias</span>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-top:10px">
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Base FALTAS (€/mês)<input type="number" step="0.01" min="0" id="vBaseFal" value="${baseFaltas()}" style="width:140px"></label>
      <span style="color:var(--ink2);font-size:13px;align-self:center">÷ 30 = <b>${fmtEur(vDiaFal)}</b>/dia descontado por cada dia de falta</span>
    </div>
    <div style="margin-top:10px"><button class="act" id="bVencCfg">Guardar valores</button></div>
  </div>`;
  return html;
}

function rCustosGerLista(){
  const lista=custosGerais();

  // repartir um custo pelas obras, mês a mês conforme m² de cada mês
  const reparte=(c)=>reparteCustoMensal(c.valor||0, c.mesIni||(c.dataIni||'').slice(0,7)||c.mes, c.mesFim||(c.dataFim||'').slice(0,7)||c.mesIni||c.mes, c.obras, false);

  const porObra={}; STORE.obras.forEach(o=>porObra[o.id]=0);
  const porCat={}; CG_CATS.forEach(c=>porCat[c]=0);
  let total=0;
  lista.forEach(c=>{ total+=c.valor||0; porCat[c.cat]=(porCat[c.cat]||0)+(c.valor||0); const r=reparte(c); Object.keys(r).forEach(id=>{ if(porObra[id]!=null) porObra[id]+=r[id]; }); });

  const mesAtual=new Date().toISOString().slice(0,7);

  let html=`<div class="big"><div class="titulo">Custos gerais (partilhados entre obras)</div>
    <div class="note" style="margin-top:0">Custos que não são de uma obra só (deslocações, alojamento, refeições…). Cada custo cobre um <b>período</b> (mês início → mês fim). O valor divide-se igualmente pelos meses, e em cada mês reparte-se pelas obras conforme os <b>m² feitos nesse mês</b>.</div>

      <div class="card" style="border-left:4px solid var(--laranja-esc)"><div class="k">Total custos gerais</div><div class="v" style="font-size:22px;color:var(--laranja-esc)">${fmtEur(total)}</div><div class="s">${lista.length} ${lista.length==1?'registo':'registos'}</div></div>
      ${CG_CATS.filter(c=>porCat[c]>0).map(c=>`<div class="card"><div class="k">${c}</div><div class="v" style="font-size:18px">${fmtEur(porCat[c])}</div></div>`).join('')}
    </div>
  </div>

  <div class="big"><div class="titulo">Adicionar custo</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Descrição<input type="text" id="cgDesc" placeholder="ex: Renda casa Vigo" style="width:190px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Categoria<select id="cgCat" style="width:120px">${CG_CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Data início<input type="date" id="cgIni" value="${mesAtual}-01" style="width:150px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Data fim<input type="date" id="cgFim" value="${mesAtual}-01" style="width:150px"></label>
      <label style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600">Valor total €<input type="number" id="cgValor" value="0" step="0.01" style="width:110px"></label>
      <button class="act" id="bCgAdd">+ Adicionar</button>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:11px;text-transform:uppercase;color:var(--ink2);font-weight:600;margin-bottom:4px">Dividir por estas obras:</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${STORE.obras.filter(o=>!obraConcluida(o.id)).map(o=>`<label style="display:flex;align-items:center;gap:5px;font-size:12px;background:var(--bg);padding:4px 10px;border-radius:6px;cursor:pointer"><input type="checkbox" class="cgObra" value="${o.id}" checked> ${o.nome}</label>`).join('')}</div>
      ${STORE.obras.some(o=>obraConcluida(o.id))? `<details style="margin-top:6px"><summary style="cursor:pointer;font-size:11px;color:var(--ink2)">Mostrar obras concluídas (${STORE.obras.filter(o=>obraConcluida(o.id)).length})</summary>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">${STORE.obras.filter(o=>obraConcluida(o.id)).map(o=>`<label style="display:flex;align-items:center;gap:5px;font-size:12px;background:var(--bg);padding:4px 10px;border-radius:6px;cursor:pointer;opacity:.75"><input type="checkbox" class="cgObra" value="${o.id}"> ${o.nome} <span style="font-size:9px;color:var(--ink2)">(concluída)</span></label>`).join('')}</div>

    const fmtMesCurto=ym=>{ const [a,m]=ym.split('-'); return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(m,10)-1]+'/'+a.slice(2); };
    const periodoTxt=ids=>{ const ms=mesesComTrab[ids]; if(!ms||!ms.length) return '—'; ms.sort(); return ms.length===1? fmtMesCurto(ms[0]) : fmtMesCurto(ms[0])+'–'+fmtMesCurto(ms[ms.length-1]); };

    html+=`<div class="big"><div class="titulo">Quanto cabe a cada obra</div>
      <div class="scroll"><table style="font-size:12.5px"><tr><th>Obra</th><th class="n">m² no período</th><th class="n">% do total</th><th>Meses com trabalho</th><th class="n">Custos gerais</th></tr>
      ${STORE.obras.map(o=>{
        const m2=m2Obra[o.id]||0; const pct=m2Tot>0? (m2/m2Tot*100):0; const v=porObra[o.id]||0;
        const cor = v>0.01? '' : 'color:var(--ink2)';
        return `<tr style="${cor}"><td><b>${o.nome}</b>${o.id===STORE.ativa?' <span style="font-size:9px;color:var(--laranja-esc)">(ativa)</span>':''}${obraConcluida(o.id)?' <span style="font-size:9px;color:var(--ink2)">(concluída)</span>':''}</td>`
          +`<td class="n">${m2>0.001?fmtN(m2)+' m²':'—'}</td>`
          +`<td class="n">${m2Tot>0&&m2>0.001?pct.toFixed(1)+'%':'—'}</td>`
          +`<td style="font-size:11px;color:var(--ink2)">${periodoTxt(o.id)}</td>`
          +`<td class="n"><b>${fmtEur(v)}</b></td></tr>`;
      }).join('')}
      <tr class="tot"><td>Total</td><td class="n">${m2Tot>0?fmtN(m2Tot)+' m²':'—'}</td><td class="n">${m2Tot>0?'100%':'—'}</td><td></td><td class="n">${fmtEur(total)}</td></tr>
      </table></div>
      <div class="note">A repartição é mês a mês: em cada mês do período (<b>${pIni?fmtMesCurto(pIni):'—'} a ${pFim?fmtMesCurto(pFim):'—'}</b>), o valor desse mês divide-se pelas obras conforme os <b>m² que cada uma fez nesse mês</b>. A coluna "% do total" é a média do período — pode não bater certo ao cêntimo com o valor final, porque a repartição é feita mês a mês (um mês com muito trabalho pesa mais nesse mês). Obras sem m² no período não recebem custos. Se um mês não teve trabalho em lado nenhum, esse valor reparte-se pelas obras ativas.</div>
    </div>`;
  }

  html+=`<div class="big"><div class="titulo">Lista de custos gerais</div>`;
  if(!lista.length){
    html+=`<div class="note" style="margin:0">Ainda não há custos gerais. Usa o formulário acima para adicionar.</div>`;
  } else {
    html+=`<div class="scroll"><table style="font-size:12.5px"><tr><th>Período</th><th>Descrição</th><th>Categoria</th><th>Obras</th><th class="n">Valor</th><th></th></tr>
    ${lista.slice().sort((a,b)=>(((a.dataIni||a.mesIni||a.mes||'')<(b.dataIni||b.mesIni||b.mes||''))?1:-1)).map(c=>{
      const fmtD=s=>{ if(!s) return '—'; const d=new Date((s.length>7?s:s+'-01')+'T00:00:00'); return isNaN(d)?s:d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'2-digit'}); };
      const ini=c.dataIni||c.mesIni||c.mes||'', fim=c.dataFim||c.mesFim||c.mesIni||c.mes||'';
      const periodo = (ini===fim||!fim)? fmtD(ini) : fmtD(ini)+' → '+fmtD(fim);
      const nObras=(c.obras&&c.obras.length)?c.obras.length:STORE.obras.length;
      return `<tr><td style="font-family:var(--mono);font-size:11px">${periodo}</td><td><b>${c.desc||'(sem descrição)'}</b></td><td>${c.cat||'—'}</td><td style="font-size:11px;color:var(--ink2)">${nObras===STORE.obras.length?'todas':nObras+' obra(s)'}</td><td class="n"><b>${fmtEur(c.valor||0)}</b></td><td><button class="mini" data-cgdel="${c.id}" style="color:var(--verm)">🗑️</button></td></tr>`;
    }).join('')}
    <tr class="tot"><td colspan="4">Total (${lista.length})</td><td class="n">${fmtEur(total)}</td><td></td></tr>
    </table></div>`;
  }
  html+=`</div>`;
  return html;
}

function rMapaTrab(){
  let html='';
  if(!DB.workers) DB.workers=[];
  const meses=mesesAtivos();
  // ===== MAPA DE FÉRIAS E AUSÊNCIAS (clicar nos dias) =====
  if(!DB.ausencias) DB.ausencias=[];
  // migrar formato antigo (períodos de/até) para dias individuais
  if(DB.ausencias.some(a=>a.de&&a.ate)){
    const novo=[];
    DB.ausencias.forEach(a=>{
      if(a.dia){ novo.push({nome:a.nome,dia:a.dia,tipo:a.tipo}); return; }
      if(a.de&&a.ate){ const d1=new Date(a.de+'T00:00:00'),d2=new Date(a.ate+'T00:00:00'); if(isNaN(d1)||isNaN(d2))return; const d=new Date(d1); while(d<=d2){ novo.push({nome:a.nome,dia:d.toISOString().slice(0,10),tipo:a.tipo}); d.setDate(d.getDate()+1);} }
    });
    DB.ausencias=novo;
  }
  // migrar tipos antigos para os novos (trabalho com fase, ferias, faltas)
  const MAP_TIPO={trabalho:'trabalho',trabalhou:'trabalho',ferias:'ferias',falta:'faltas',faltas:'faltas',baixa:'faltas',chuva:'faltas',deslocacao:'faltas',feriado:'faltas',inativos:'faltas'};
  DB.ausencias.forEach(a=>{ a.tipo=MAP_TIPO[a.tipo]||'faltas'; });
  const FS=FASES;
  // "tipos" do mapa = uma entrada por fase (trabalho nessa fase) + férias + faltas
  const AUS_TIPOS={ferias:{lbl:'Férias',cor:'#C9A227'},faltas:{lbl:'Faltas',cor:'#C0392B'}};
  const faseLetra=(fid)=>{ const n=faseNome(fid); return n?n[0].toUpperCase():'?'; };
  const hoje2=new Date(); hoje2.setHours(0,0,0,0);
  const mesesCal=[...new Set([...meses, hoje2.toISOString().slice(0,7)])].sort();
  const diasNoMes=(ym)=>{ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); };
  const ausDoDia=(nome,ymd)=>DB.ausencias.find(a=>a.nome===nome&&a.dia===ymd);
  // seleção: 'fase:F1' (trabalho em F1), 'ferias', 'faltas', 'apagar'
  let sel = DB.config._ausSel || ('fase:'+(FS[0]||'F1'));
  // validar seleção
  if(sel.startsWith('fase:') && !FS.includes(sel.slice(5))) sel='fase:'+(FS[0]||'F1');
  if(!sel.startsWith('fase:') && sel!=='ferias' && sel!=='faltas' && sel!=='apagar') sel='fase:'+(FS[0]||'F1');
  if(!DB.mapaMesFechado) DB.mapaMesFechado={};
  // cor/label de uma célula consoante o registo
  const corDia=(a)=>{ if(!a) return null; if(a.tipo==='trabalho'){ return faseCor(a.fase||FS[0]); } return (AUS_TIPOS[a.tipo]||{}).cor||'#999'; };
  const letraDia=(a)=>{ if(!a) return ''; if(a.tipo==='trabalho'){ return faseLetra(a.fase||FS[0]); } return a.tipo==='ferias'?'F':'•'; };

  html+=`<div class="big" style="border-left:4px solid var(--verde)"><div class="titulo">Mapa de trabalho</div>
    <div class="note" style="margin-top:0">Escolhe a <b>fase</b> (ou Férias/Faltas) e <b>clica nos dias</b> de cada pessoa. Cada dia de trabalho mostra a inicial da fase. Clica no <b>número do dia</b> para marcar a equipa toda na fase escolhida. A produtividade de cada fase usa os dias marcados nessa fase. Os dias com <span style="color:#C0392B">●</span> (fundo riscado) indicam que o funcionário já está noutra obra nesse dia — não pode estar em duas ao mesmo tempo.</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0">
      ${FS.map(f=>{ const v='fase:'+f; const cor=faseCor(f); return `<button class="ausTipoBtn" data-ausselv="${v}" style="border:2px solid ${cor};background:${sel===v?cor:'transparent'};color:${sel===v?'#fff':cor};padding:5px 12px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer">${faseNome(f)}</button>`; }).join('')}
      ${Object.keys(AUS_TIPOS).map(t=>`<button class="ausTipoBtn" data-ausselv="${t}" style="border:2px solid ${AUS_TIPOS[t].cor};background:${sel===t?AUS_TIPOS[t].cor:'transparent'};color:${sel===t?'#fff':AUS_TIPOS[t].cor};padding:5px 12px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer">${AUS_TIPOS[t].lbl}</button>`).join('')}
      <button class="ausTipoBtn" data-ausselv="apagar" style="border:2px solid var(--ink2);background:${sel==='apagar'?'var(--ink2)':'transparent'};color:${sel==='apagar'?'#fff':'var(--ink2)'};padding:5px 12px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer">🧹 Borracha</button>
    </div>
    <div style="font-size:11px;color:var(--ink2);margin-bottom:6px">${FS.map(f=>`<span style="margin-right:12px"><b style="color:${faseCor(f)}">${faseLetra(f)}</b> = ${faseNome(f)}</span>`).join('')}</div>`;

  if(!DB.workers.length){
    html+=`<div class="note" style="margin:0">Adiciona funcionários primeiro (na aba Equipa) para usar o mapa.</div>`;
  } else {
    mesesCal.forEach(ym=>{
      const nd=diasNoMes(ym);
      const fechado=!!DB.mapaMesFechado[ym];
      let diasTrabMesTot=0; DB.ausencias.forEach(a=>{ if(a.dia&&a.dia.slice(0,7)===ym&&a.tipo==='trabalho') diasTrabMesTot++; });
      html+=`<div style="margin-bottom:14px"><div class="mapMesHdr" data-mapmes="${ym}" style="font-weight:700;font-size:13px;margin-bottom:4px;cursor:pointer;background:#F0F7F3;padding:6px 8px;border-radius:6px"><span style="display:inline-block;width:14px">${fechado?'▶':'▼'}</span>${mesLbl(ym)} <span style="font-weight:500;color:var(--ink2);font-size:11px">· ${diasTrabMesTot} dias-pessoa de trabalho</span></div>`;
      if(!fechado){
        html+=`<div class="scroll"><table style="border-collapse:collapse;font-size:10px"><tr><th style="position:sticky;left:0;background:var(--bg);text-align:left;padding:2px 6px;min-width:90px">Funcionário <span style="font-weight:400;color:var(--ink2);font-size:9px">(clica nº)</span></th>${Array.from({length:nd},(_, i)=>{ const d=i+1; const dow=new Date(ym+'-'+String(d).padStart(2,'0')+'T00:00:00').getDay(); const we=dow===0||dow===6; return `<th class="mapDiaHdr" data-mapdia="${ym}-${String(d).padStart(2,'0')}" style="padding:3px 0;width:20px;text-align:center;font-weight:700;color:#fff;background:${we?'var(--verm)':'#0E8A6E'};cursor:pointer;border:1px solid #fff" title="Marcar equipa toda no dia ${d}">${d}</th>`; }).join('')}</tr>`;
        DB.workers.forEach(w=>{
          html+=`<tr><td style="position:sticky;left:0;background:var(--bg);font-weight:600;padding:2px 6px;white-space:nowrap">${nomeComApelido(w.nome)}</td>`;
          for(let d=1;d<=nd;d++){
            const ymd=ym+'-'+String(d).padStart(2,'0');
            const dow=new Date(ymd+'T00:00:00').getDay(); const we=dow===0||dow===6;
            const a=ausDoDia(w.nome,ymd);
            // ocupado noutra obra nesse dia? (só relevante se não tem marcação nesta obra)
            const noutra = !a ? funcOcupadoNoutraObra(w.nome, ymd, STORE.ativa) : null;
            const bg = a? corDia(a) : (noutra? 'repeating-linear-gradient(45deg,#F0E6E6,#F0E6E6 3px,#fff 3px,#fff 6px)' : (we?'#EEF1F0':'#fff'));
            const txt = a? letraDia(a) : (noutra? '<span style="font-size:8px;color:#C0392B">●</span>' : '');
            const tcor = a&&a.tipo==='trabalho'?'#fff':(a?'#fff':'');
            const tip = a? ymd+' — '+(a.tipo==='trabalho'?faseNome(a.fase||FS[0]):(AUS_TIPOS[a.tipo]||{}).lbl) : (noutra? ymd+' — já está na obra "'+noutra+'" neste dia' : ymd);
            html+=`<td class="ausCel" data-ausnome="${w.nome}" data-ausdia="${ymd}" title="${tip}" style="width:20px;height:20px;background:${bg};color:${tcor};text-align:center;font-weight:700;font-size:10px;border:1px solid #E8EDE9;cursor:pointer">${txt}</td>`;
          }
          html+=`</tr>`;
        });
        html+=`</table></div>`;
      }
      html+=`</div>`;
    });
    // resumo: dias de trabalho por fase + férias/faltas por funcionário
    html+=`<div class="titulo" style="font-size:13px;margin-top:10px">Total de dias por funcionário</div>
    <div class="scroll"><table style="font-size:12px"><tr><th>Funcionário</th>${FS.map(f=>`<th class="n" style="color:${faseCor(f)}">${faseNome(f)}</th>`).join('')}<th class="n" style="color:${AUS_TIPOS.ferias.cor}">Férias</th><th class="n" style="color:${AUS_TIPOS.faltas.cor}">Faltas</th><th class="n">Total trab.</th></tr>
    ${DB.workers.map(w=>{
      const cf={}; FS.forEach(f=>cf[f]=0); let nFer=0,nFal=0;
      DB.ausencias.forEach(a=>{ if(a.nome!==w.nome)return; if(a.tipo==='trabalho')cf[a.fase||FS[0]]=(cf[a.fase||FS[0]]||0)+1; else if(a.tipo==='ferias')nFer++; else if(a.tipo==='faltas')nFal++; });
      const totTrab=FS.reduce((s,f)=>s+cf[f],0);
      if(totTrab===0&&nFer===0&&nFal===0) return '';
      return `<tr><td><b>${nomeComApelido(w.nome)}</b></td>${FS.map(f=>`<td class="n">${cf[f]||'—'}</td>`).join('')}<td class="n">${nFer||'—'}</td><td class="n">${nFal||'—'}</td><td class="n"><b>${totTrab}</b></td></tr>`;
    }).join('')}
    </table></div>`;
  }
  html+=`</div>`;

  return html;
}

function barraPrazo(c){
  const ini=c.dataInicio, fim=c.dataFimPrev, real=c.dataFimReal;
  if(!ini && !fim && !real) return '';
  const concl=!!c.concluida;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const dI=ini?new Date(ini+'T00:00:00'):null;
  const dF=fim?new Date(fim+'T00:00:00'):null;
  const dR=real?new Date(real+'T00:00:00'):null;
  // referência para os cálculos: fim real > (se concluída) fim previsto > hoje
  const ref = dR ? dR : ((concl && dF) ? dF : hoje);
  const dias=(a,b)=>Math.round((b-a)/86400000);
  const fmtD=d=>d?d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
  let cartoes='', barra='';
  const acabou = concl || !!dR; // obra terminada (por estado ou por ter fim real)
  if(dI){ const dec=dias(dI,ref); cartoes+=`<div class="card"><div class="k">Início</div><div class="v" style="font-size:16px">${fmtD(dI)}</div><div class="s">${acabou?dec+' dias de duração':(dec>=0?dec+' dias decorridos':'começa em '+(-dec)+' dias')}</div></div>`; }
  if(dF){
    if(acabou){ cartoes+=`<div class="card"><div class="k">Fim previsto</div><div class="v" style="font-size:16px">${fmtD(dF)}</div><div class="s">data prevista</div></div>`; }
    else { const falta=dias(hoje,dF); const atras=falta<0; cartoes+=`<div class="card" style="border-left:4px solid ${atras?'var(--verm)':'var(--verde)'}"><div class="k">Fim previsto</div><div class="v" style="font-size:16px;color:${atras?'var(--verm)':'inherit'}">${fmtD(dF)}</div><div class="s">${atras?Math.abs(falta)+' dias em atraso':falta+' dias em falta'}</div></div>`; }
  }
  if(dR){
    // comparar fim real com o previsto
    let sub='🏁 obra concluída';
    if(dF){ const dif=dias(dF,dR); sub = dif===0 ? '🏁 acabou no prazo' : (dif<0 ? '🏁 '+Math.abs(dif)+' dias antes do previsto' : '🏁 '+dif+' dias depois do previsto'); }
    const cor = dF && dias(dF,dR)>0 ? 'var(--laranja-esc)' : 'var(--verde)';
    cartoes+=`<div class="card" style="border-left:4px solid ${cor}"><div class="k">Fim real</div><div class="v" style="font-size:16px;color:${cor}">${fmtD(dR)}</div><div class="s">${sub}</div></div>`;
  } else if(concl && dF){
    cartoes+=`<div class="card" style="border-left:4px solid var(--verde)"><div class="k">Fim real</div><div class="v" style="font-size:16px;color:var(--ink2)">—</div><div class="s">preenche a data de fim real</div></div>`;
  }
  if(dI&&dF){ const tot=dias(dI,dF); const dec=Math.max(0,Math.min(tot,dias(dI,ref))); const pct=tot>0?Math.round(dec/tot*100):0; const atras=!acabou&&hoje>dF;
    barra=`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink2);margin-bottom:4px"><span>${acabou?'100% — concluída':pct+'% do prazo decorrido'}</span><span>${tot} dias de prazo total</span></div>
      <div style="height:16px;background:var(--linha);border-radius:8px;overflow:hidden"><div style="height:100%;width:${acabou?100:Math.min(100,pct)}%;background:${acabou?'var(--verde)':atras?'var(--verm)':pct>85?'var(--laranja)':'var(--verde)'};border-radius:8px;transition:width .3s"></div></div></div>`;
  }
  return `<div style="margin-top:12px"><div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">${cartoes}</div>${barra}</div>`;
}

function rCfgObra(){

  const totM2=FASES.reduce((a,f)=>a+(c.precos[f]||0),0);
  const lbl=t=>`style="display:flex;flex-direction:column;gap:3px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600"`;

      <label ${lbl()}>Fim real<input type="date" id="cDataFimReal" value="${c.dataFimReal||''}" style="width:170px"></label>

      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;font-weight:600;color:${c.concluida?'var(--verde)':'var(--ink)'}">

      </label>
      <div class="note" style="margin:6px 0 0">Quando uma obra está concluída, deixa de receber custos partilhados nos meses em que nenhuma obra trabalhou — esses custos vão para as obras ainda ativas, na proporção do trabalho de cada uma.</div>
    </div>
    <div class="note">O orçamento é calculado automaticamente: soma de todas as zonas do auto (concluído + pendente) mais as horas. Atualiza-se sozinho sempre que lanças ou alteras autos.</div>
  </div>

  <div class="big"><div class="titulo">Fases da obra (nome, cor e estado)</div>
    <div class="note" style="margin-top:0">Define o nome de cada fase. Estas fases aparecem no auto, nos pagamentos, na faturação e na produtividade. Podes <b>anular</b> as fases que não usas nesta obra — desaparecem de todo o lado. Só se podem anular fases sem trabalho lançado.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
      ${fasesCfg().map((fa,i)=>{ const anulada=fa.ativa===false; const temTrab=faseTemTrabalho(fa.id); return `<div style="display:flex;flex-direction:column;gap:3px;padding:8px;border:1px solid var(--linha);border-radius:8px;text-transform:none;${anulada?'opacity:.55;background:#F7F7F7':''}">
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:600"><input type="color" class="faseCor" data-i="${i}" value="${fa.cor}" style="width:28px;height:24px;padding:0;border:none;background:none;cursor:pointer"> Fase ${i+1}${anulada?' <span style="font-size:9px;color:var(--verm)">ANULADA</span>':''}</span>

      ${FASES.map(f=>`<label ${lbl()}>${tagFase(f)}<input type="number" step="0.01" class="pmFaseCfg" data-f="${f}" placeholder="—" style="width:90px"></label>`).join('')}
      <button class="act" id="bPmCfg">Aplicar ao mês</button>

  <div class="big"><div class="titulo">Regras de divisão do pagamento</div>

    </div>

  <div class="bar"><button class="act" id="bCfg">Guardar configuração</button></div>

  <div class="big"><div class="titulo">Atualizar preços de um mês (exceção)</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <label ${lbl()}>Mês<input type="text" id="cMesPreco" value="2026-06" style="width:100px"></label>

// ===== Eventos =====
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); tab=b.dataset.t; editId=null; render();
});
function bind(){
  const $=id=>document.getElementById(id);
  if($('bNovaObra2')) $('bNovaObra2').onclick=()=>{ const nome=prompt('Nome da nova obra:'); if(nome===null)return; criarObra(nome.trim()||'Nova obra'); };
  if($('bRecSegEq')) $('bRecSegEq').onclick=()=>{
    const emb=(STORE_INICIAL.obras||[]).find(o=>o.nome===obraAtiva().nome) || (STORE_INICIAL.obras||[])[0];
    if(!emb){ alert('Não há dados embutidos para repor.'); return; }
    if(!confirm('Repor esta obra com os dados embutidos de 18/06 ('+emb.nome+')?\n\nSubstitui a obra ativa pela versão embutida completa.')) return;
    const i=STORE.obras.findIndex(o=>o.id===STORE.ativa);
    STORE.obras[i]={id:STORE.ativa, nome:emb.nome, db:repararDB(JSON.parse(JSON.stringify(emb.db)))};
    DB=obraAtiva().db; save(); render();
    alert('Obra reposta: '+DB.zones.length+' zonas, '+DB.workers.length+' funcionários.');
  };
  if($('bReporEmbutido')) $('bReporEmbutido').onclick=()=>{
    if(!confirm('Repor as obras com os dados embutidos de 18/06 (92 Vivendas + Residência Est)?\n\nISTO SUBSTITUI tudo o que está agora guardado no browser. Usa isto se a app não carregou os dados certos.\n\nExporta uma cópia de segurança antes, se tiveres trabalho recente que não queiras perder.')) return;
    STORE = JSON.parse(JSON.stringify(STORE_INICIAL));
    STORE.obras.forEach(o=>o.db=repararDB(o.db));
    if(!STORE.obras.find(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0].id;
    DB=obraAtiva().db; save(); render();
    alert('Dados repostos: '+STORE.obras.map(o=>o.nome+' ('+o.db.zones.length+'z)').join(', '));
  };
  document.querySelectorAll('[data-abrirobra]').forEach(b=>b.onclick=()=>trocarObra(b.getAttribute('data-abrirobra')));
  document.querySelectorAll('[data-renomearobra]').forEach(b=>b.onclick=()=>{ const id=b.getAttribute('data-renomearobra'); const o=STORE.obras.find(x=>x.id===id); const nome=prompt('Novo nome da obra:', o?o.nome:''); if(nome===null)return; renomearObra(id,nome.trim()||o.nome); });
  document.querySelectorAll('[data-duplicarobra]').forEach(b=>b.onclick=()=>{ if(confirm('Duplicar esta obra? Copia a configuração (preços, fases, equipa) mas começa sem zonas nem pagamentos.')) duplicarObra(b.getAttribute('data-duplicarobra')); });
  document.querySelectorAll('[data-duptudo]').forEach(b=>b.onclick=()=>{ if(confirm('Duplicar esta obra com TUDO? Cópia exata: zonas, equipa, preços, fases, pagamentos e produtividade.\n\nFica uma obra nova igual à original, que podes depois renomear e editar.')) duplicarObraTudo(b.getAttribute('data-duptudo')); });
  document.querySelectorAll('[data-apagarobra]').forEach(b=>b.onclick=()=>{ const id=b.getAttribute('data-apagarobra'); const o=STORE.obras.find(x=>x.id===id); if(confirm('APAGAR a obra "'+(o?o.nome:'')+'" e todos os seus dados? Isto não se desfaz.\n\nExporta uma cópia de segurança antes, se precisares.')) apagarObra(id); });
  document.querySelectorAll('[data-togglefase]').forEach(b=>b.onclick=()=>{
    const id=b.getAttribute('data-togglefase');
    const fa=fasesCfg().find(x=>x.id===id); if(!fa)return;
    if(fa.ativa===false){ fa.ativa=true; registaCfg('Fase reativada: '+fa.nome); save(); render(); return; }
    if(faseTemTrabalho(id)){ alert('Não podes anular a fase '+fa.nome+': tem trabalho lançado em pelo menos uma zona. Apaga ou muda esse trabalho primeiro, depois anula a fase.'); return; }
    fa.ativa=false; registaCfg('Fase anulada: '+fa.nome); save(); render();
  });
  if($('bSalvaPesos')) $('bSalvaPesos').onclick=()=>{
    const fs=fasesCfg();
    const antes=FASES.map(f=>faseNome(f)+' '+pesoFaseRaw(f)+'%').join(', ');
    document.querySelectorAll('.cPeso').forEach(el=>{
      const id=el.id.replace('cPeso_',''); const v=parseFloat(el.value);
      const fa=fs.find(x=>x.id===id); if(fa) fa.peso=(isNaN(v)||v<0)?0:v;
    });
    DB.config.fases=fs;
    const depois=FASES.map(f=>faseNome(f)+' '+pesoFaseRaw(f)+'%').join(', ');
    registaCfg('Pesos das fases: '+depois); save(); render();
  };
  document.querySelectorAll('.cPeso').forEach(el=>{ el.oninput=()=>{ const s=document.querySelectorAll('.cPeso'); let t=0; s.forEach(x=>t+=parseFloat(x.value)||0); if($('cPesoSoma')) $('cPesoSoma').textContent=t+'%'; }; });
  if($('bSalvaFases')) $('bSalvaFases').onclick=()=>{
    const fs=fasesCfg();
    document.querySelectorAll('.faseNome').forEach(el=>{ const i=+el.getAttribute('data-i'); if(fs[i]) fs[i].nome=el.value.trim()||fs[i].nome; });
    document.querySelectorAll('.faseCor').forEach(el=>{ const i=+el.getAttribute('data-i'); if(fs[i]) fs[i].cor=el.value; });
    DB.config.fases=fs; registaCfg('Nomes/cores das fases atualizados: '+fs.map(f=>f.nome).join(', ')); save(); render();
  };
  if($('bHist')) $('bHist').onclick=()=>{ histAberto=!histAberto; render(); };
  if($('bSalvaDatas')) $('bSalvaDatas').onclick=()=>{
    const c=DB.config; const ni=$('cDataInicio').value||'', nf=$('cDataFimPrev').value||'', nr=($('cDataFimReal')?$('cDataFimReal').value:'')||'';
    const muda=[];
    if(ni!==(c.dataInicio||'')) muda.push('Data de início: '+(c.dataInicio||'(vazia)')+' → '+(ni||'(vazia)'));
    if(nf!==(c.dataFimPrev||'')) muda.push('Fim previsto: '+(c.dataFimPrev||'(vazia)')+' → '+(nf||'(vazia)'));
    if(nr!==(c.dataFimReal||'')) muda.push('Fim real: '+(c.dataFimReal||'(vazia)')+' → '+(nr||'(vazia)'));
    c.dataInicio=ni; c.dataFimPrev=nf; c.dataFimReal=nr;
    // preservar também o nome/cliente que possam estar escritos nos campos (para não se perderem ao redesenhar)
    if($('cObra')){ const nome=$('cObra').value.trim(); if(nome && nome!==c.obra){ c.obra=nome; const o=obraAtiva(); if(o) o.nome=nome; } }
    if($('cCliente')) c.cliente=$('cCliente').value;
    if(muda.length) registaCfg(muda.join(' · '));
    save(); render();
  };
  if($('cConcluida')) $('cConcluida').onchange=()=>{
    DB.config.concluida=$('cConcluida').checked;
    registaCfg(DB.config.concluida?'Obra marcada como CONCLUÍDA':'Obra reaberta (já não está concluída)');
    save(); render();
  };
  // guardar nome/cliente automaticamente ao sair do campo (evita perder o que está escrito)
  if($('cObra')) $('cObra').onchange=()=>{ const n=$('cObra').value.trim(); if(n){ DB.config.obra=n; const o=obraAtiva(); if(o)o.nome=n; save(); } };
  if($('cCliente')) $('cCliente').onchange=()=>{ DB.config.cliente=$('cCliente').value; save(); };
  // previsão de fim
  const ensurePrev=()=>{ if(!DB.config.prevFim) DB.config.prevFim={modo:'func',nFunc:5,data:''}; return DB.config.prevFim; };
  if($('bPrevModoF')) $('bPrevModoF').onclick=()=>{ ensurePrev().modo='func'; save(); render(); };
  if($('bPrevModoD')) $('bPrevModoD').onclick=()=>{ ensurePrev().modo='data'; save(); render(); };
  if($('prevNFunc')) $('prevNFunc').onchange=()=>{ ensurePrev().nFunc=Math.max(1,parseInt($('prevNFunc').value)||1); save(); render(); };
  if($('prevData')) $('prevData').onchange=()=>{ ensurePrev().data=$('prevData').value||''; save(); render(); };
  // equipamentos
  if($('bEqAdd')) $('bEqAdd').onclick=()=>{
    const nome=($('eqNome').value||'').trim();
    if(!nome){ alert('Escreve o nome do equipamento.'); return; }
    const lista=equipList();
    lista.push({ id:Date.now(), nome, qtd:Math.max(1,parseInt($('eqQtd').value)||1), de:$('eqDe').value||'', ate:$('eqAte').value||'', estado:$('eqEstado').value||'Em obra', resp:($('eqResp')?$('eqResp').value:'')||'', tipoCusto:'compra', valor:parseFloat($('eqValor').value)||0 });
    save(); render();
  };
  document.querySelectorAll('[data-eqest]').forEach(b=>b.onclick=()=>{
    const e=equipList().find(x=>x.id===parseInt(b.getAttribute('data-eqest'))); if(!e) return;
    const i=EQ_ESTADOS.indexOf(e.estado); e.estado=EQ_ESTADOS[(i+1)%EQ_ESTADOS.length]; save(); render();
  });
  document.querySelectorAll('[data-eqresp]').forEach(b=>b.onclick=()=>{
    const e=equipList().find(x=>x.id===parseInt(b.getAttribute('data-eqresp'))); if(!e) return;
    const nomes=todosTrabalhadores();
    if(!nomes.length){ alert('Sem funcionários registados. Vai à aba Equipa e adiciona primeiro.'); return; }
    const lista2=['(ninguém)',...nomes];
    const atual = e.resp? nomes.indexOf(e.resp)+1 : 0;
    const msg='Responsável por "'+e.nome+'":\n'+lista2.map((n,i)=>i+' = '+n).join('\n')+'\n\nEscreve o número:';
    const r=prompt(msg, atual);
    if(r===null) return;
    const idx=parseInt(r);
    if(!isNaN(idx)&&idx>=0&&idx<lista2.length){ e.resp = idx===0?'':lista2[idx]; save(); render(); }
  });
  document.querySelectorAll('[data-eqdel]').forEach(b=>b.onclick=()=>{
    const id=parseInt(b.getAttribute('data-eqdel')); const e=equipList().find(x=>x.id===id);
    if(e && confirm('Apagar "'+e.nome+'"?')){ STORE.equipamentos=equipList().filter(x=>x.id!==id); save(); render(); }
  });
  // sub-abas dos custos gerais
  document.querySelectorAll('.cgSubBtn').forEach(b=>b.onclick=()=>{ STORE.cgSub=b.getAttribute('data-cgsub'); save(); render(); });
  // vencimentos
  if($('vMes')) $('vMes').onchange=()=>{ STORE.vencMes=$('vMes').value; save(); render(); };
  document.querySelectorAll('.vSubBtn').forEach(b=>b.onclick=()=>{ STORE.vencSub=b.getAttribute('data-vsub'); save(); render(); });
  if($('bVNovo')) $('bVNovo').onclick=()=>{
    const n=($('vNovoNome').value||'').trim().toUpperCase();
    if(!n){ alert('Escreve o nome do funcionário.'); return; }
    const lista=funcionariosGlobais();
    if(lista.includes(n)){ alert('Esse funcionário já existe na lista.'); return; }
    lista.push(n); save(); render();
  };
  document.querySelectorAll('[data-vape]').forEach(b=>b.onclick=()=>{
    const nome=b.getAttribute('data-vape');
    const atual=apelidoDe(nome);
    const ape=prompt('Apelido / apontamento para '+nome+':\n\n(Aparece ao lado do nome em toda a app. Não altera o nome usado nos cálculos. Deixa vazio para remover.)', atual);
    if(ape===null) return;
    definirApelido(nome, ape);
    registaCfg(ape.trim()? ('Apelido de '+nome+': '+ape.trim()) : ('Apelido de '+nome+' removido'));
    save(); render();
  });
  document.querySelectorAll('[data-vedit]').forEach(b=>b.onclick=()=>{
    const antigo=b.getAttribute('data-vedit');
    const novo=prompt('Editar nome do funcionário:\n\n(O nome muda em todo o lado: medições, pagamentos, faltas/férias e equipas. O histórico mantém-se.)', antigo);
    if(novo===null) return;
    const nv=novo.trim().toUpperCase();
    if(!nv){ alert('O nome não pode ficar vazio.'); return; }
    if(nv===antigo.toUpperCase()) return;
    if(funcionariosGlobais().some(x=>x.toUpperCase()===nv && x.toUpperCase()!==antigo.toUpperCase())){
      if(!confirm('Já existe um funcionário "'+nv+'". Queres juntar os dois (o histórico de ambos fica com este nome)?')) return;
    }
    if(renomearFuncionario(antigo, nv)){ registaCfg('Funcionário renomeado: '+antigo+' → '+nv); save(); render(); }
    else alert('Não foi possível renomear.');
  });
  document.querySelectorAll('[data-vdel]').forEach(b=>b.onclick=()=>{
    const n=b.getAttribute('data-vdel');
    const obs=obrasDoFuncionario(n);
    const aviso = obs.length? '\n\nEstá dedicado a: '+obs.map(o=>o.nome).join(', ')+'.\nVai ser retirado dessas obras (as medições e pagamentos antigos mantêm-se).' : '';
    if(confirm('Remover "'+n+'" da lista global?'+aviso)){
      STORE.funcionarios=funcionariosGlobais().filter(x=>x!==n);
      obs.forEach(o=>{ o.db.workers=(o.db.workers||[]).filter(w=>w.nome!==n); });
      save(); render();
    }
  });
  if($('bVencCfg')) $('bVencCfg').onclick=()=>{
    if(!STORE.vencCfg) STORE.vencCfg={};
    STORE.vencCfg.baseFerias=parseFloat($('vBaseFer').value)||0;
    STORE.vencCfg.baseFaltas=parseFloat($('vBaseFal').value)||0;
    save(); render();

  if($('bSync')) $('bSync').onclick=()=>{
    const obraId=STORE.ativa;
    // custos partilhados que cabem a ESTA obra, por mês e categoria
    // mapa de categoria Funcionários → categoria Empresa
    const mapCat={'Deslocação':'TRANSPORTES','Alojamento':'ALOJAMENTO','Refeições':'OUTROS','Outros':'OUTROS'};
    // acumular {catEmp: {mes: valor}} para esta obra
    const partilhados={};
    const addPart=(catEmp,mes,val)=>{ if(!(val>0)||!mes)return; if(!partilhados[catEmp])partilhados[catEmp]={}; partilhados[catEmp][mes]=(partilhados[catEmp][mes]||0)+val; };
    // custos gerais
    custosGerais().forEach(c=>{
      const catEmp=mapCat[c.cat]||'OUTROS';
      const cmi=c.mesIni||(c.dataIni||'').slice(0,7)||c.mes, cmf=c.mesFim||(c.dataFim||'').slice(0,7)||cmi;
      const {det}=reparteCustoMensal(c.valor||0, cmi, cmf, c.obras, true);
      if(det[obraId]) Object.keys(det[obraId]).forEach(mes=>addPart(catEmp,mes,det[obraId][mes]));
    });
    // equipamentos (categoria EQUIPAMENTO), repartidos mês a mês pelos meses que duram
    equipList().forEach(e=>{
      const custo=equipCusto(e); const mi=(e.de||'').slice(0,7), mf=(e.ate||'').slice(0,7)||mi;
      if(custo>0&&mi){ const {det}=reparteCustoMensal(custo, mi, mf, null, true); if(det[obraId]) Object.keys(det[obraId]).forEach(mes=>addPart('EQUIPAMENTO',mes,det[obraId][mes])); }
    });
    // converter para listas por categoria
    const custosPartilhados=[];
    Object.keys(partilhados).forEach(catEmp=>{ Object.keys(partilhados[catEmp]).forEach(mes=>{ custosPartilhados.push({cat:catEmp, mes, valor:Math.round(partilhados[catEmp][mes]*100)/100}); }); });
    const custosPart=custosPartilhados.filter(x=>x.valor>0.01).sort((a,b)=>a.mes<b.mes?-1:1);

    const pacote={tipo:'sync_constroii_autos',obra:DB.config.obra,exportado:agora(),concluida:!!DB.config.concluida,
      dataInicio:DB.config.dataInicio||'', dataFimPrev:DB.config.dataFimPrev||'', dataFimReal:DB.config.dataFimReal||'',
      fasesCfg:JSON.parse(JSON.stringify(fasesCfg())),
      zones:DB.zones.map(z=>({desc:z.desc,comp:z.comp,alt:z.alt,area:z.area,dataAuto:z.dataAuto||'',anulada:!!z.anulada,
        fases:Object.fromEntries(FASES.map(f=>[f, z.fases[f]&&z.fases[f].anulada? {anulada:true} : (z.fases[f]&&z.fases[f].mes? {mes:z.fases[f].mes} : null)]))})),
      extras:DB.extras.map(e=>({desc:e.desc,area:e.area,mes:e.mes})),
      salarios:mesesAtivos().map(m=>({mes:m, valor:Math.round(Object.values(calcMes(m)).reduce((a,o)=>a+o.aPagar,0)*100)/100})).filter(s=>s.valor>0.01),
      custosPartilhados:custosPart};
    const a=document.createElement('a');
    a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(pacote));
    a.download='sync_autos_'+DB.config.obra.replace(/\W+/g,'_').toLowerCase()+'.json'; a.click();
    const totPart=custosPart.reduce((s,x)=>s+x.valor,0);
    alert('Ficheiro de sincronização criado para "'+DB.config.obra+'".\n\nInclui a parte desta obra nos custos partilhados: '+fmtEur(totPart)+' ('+custosPart.length+' linhas).\n\nAbre a app Empresa → Configuração → "⇄ Importar autos da app Funcionários" e escolhe este ficheiro.\n\nLembra-te de exportar para CADA obra (troca a obra ativa e exporta de novo).');
  };
  if($('bExp')) $('bExp').onclick=()=>{
    const out={tipo:'constroii_backup_multi', exportado:hojeData(), store:STORE};
    const a=document.createElement('a');
    a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(out,null,1));
    a.download='constroii_funcionarios_TODAS_OBRAS_'+hojeData()+'.json'; a.click();
    STORE.ultimoBackup=hojeData(); save(); render();
  };
  if($('bImp')) $('bImp').onclick=()=>$('impFile').click();
  if($('impFile')) $('impFile').onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=()=>{ try{
      const p=JSON.parse(r.result);
      if(p && p.tipo==='constroii_zonas_obra_ativa' && Array.isArray(p.zones)){
        // importar zonas para a OBRA ATIVA, mantendo config e funcionários
        const msg='Importar '+p.zones.length+' zonas para a obra ATIVA "'+DB.config.obra+'"'+(p.obra?' (ficheiro: '+p.obra+')':'')+'?\n\nISTO SUBSTITUI as zonas atuais desta obra. A configuração (preços, fases) e os funcionários MANTÊM-SE.\n\nOK = substituir zonas · Cancelar = não fazer nada';
        if(!confirm(msg)) { e.target.value=''; return; }
        // aplicar preços do ficheiro à config (se vierem) para o cálculo bater
        if(p.precos){ FASES.forEach(f=>{ if(p.precos[f]!=null) DB.config.precos[f]=p.precos[f]; }); }
        let nid=1;
        DB.zones = p.zones.map(z=>{
          const fases={};
          FASES.forEach(f=>{ const fd=z.fases&&z.fases[f]; fases[f] = fd&&fd.anulada?{anulada:true}:(fd&&fd.mes?{mes:fd.mes,preco:fd.preco!=null?fd.preco:(DB.config.precos[f]||0)}:null); });
          return {id:nid++, desc:z.desc||'', comp:z.comp||0, alt:z.alt||0, area:z.area||0, dataAuto:z.dataAuto||'', anulada:!!z.anulada, fases};
        });
        DB.nextZoneId = nid;
        registaCfg('Importadas '+DB.zones.length+' zonas (substituição) para '+DB.config.obra);
        save(); render();
        alert('Importadas '+DB.zones.length+' zonas para "'+DB.config.obra+'". Config e funcionários mantidos.');
        e.target.value=''; return;
      }
      if(p && p.tipo==='constroii_backup_multi' && p.store && p.store.obras){
        if(!confirm('Isto substitui TODAS as obras pelas do ficheiro. Continuar?')) return;
        STORE=p.store; STORE.obras.forEach(o=>o.db=repararDB(o.db));
        if(!STORE.obras.find(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0].id;
        DB=obraAtiva().db; save(); render();
      } else if(p && p.config && Array.isArray(p.zones)){
        // backup de obra única (formato antigo) → importar como nova obra
        if(!confirm('Este ficheiro é de uma obra só. Acrescentar como nova obra?')) return;
        const id='obra'+Date.now(); STORE.obras.push({id,nome:(p.config.obra||'Obra importada'),db:repararDB(p)}); STORE.ativa=id; DB=obraAtiva().db; save(); render();
      } else { alert('Ficheiro inválido.'); }
    }catch(x){ alert('Ficheiro inválido: '+x.message); } }; r.readAsText(f);
  };
  if($('bLimpar')) $('bLimpar').onclick=()=>{
    if(!confirm('Limpar TODOS os autos?\n\nIsto apaga as zonas/medições e as horas avulsas. A configuração (preços, regras) e a lista de funcionários mantêm-se.')) return;
    const comPag=confirm('Apagar também os PAGAMENTOS registados e as funções por mês?\n\nOK = apagar tudo (obra do zero)\nCancelar = manter pagamentos e funções');
    DB.zones=[]; DB.extras=[];
    if(comPag){ DB.payments=[]; DB.roles={}; }
    registaCfg('Autos limpos'+(comPag?' (incluindo pagamentos e funções)':' (pagamentos mantidos)'));
    save(); render();
  };
  if($('bReset')) $('bReset').onclick=()=>{ if(confirm('Isto apaga tudo e volta aos dados iniciais. Continuar?')){ DB=JSON.parse(JSON.stringify(SEED)); save(); render(); }};
}
document.getElementById('bGuardarTudo').addEventListener('click', guardarJa);
(function(){ const b=document.getElementById('bSair'); if(b) b.addEventListener('click', async()=>{ if(confirm('Terminar sessão? Os dados ficam guardados na nuvem.')){ try{ await fbAuth.signOut(); location.reload(); }catch(e){ alert('Erro ao sair: '+e.message); } } }); })();
document.getElementById('selObra').addEventListener('change', e=>trocarObra(e.target.value));
document.getElementById('bNovaObra').addEventListener('click', ()=>{
  const nome=prompt('Nome da nova obra:'); if(nome===null) return;
  criarObra(nome.trim()||'Nova obra');
});
document.getElementById('bGerirObras').addEventListener('click', ()=>{
  tab='obras';
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
  render();
});
// ── PWA: manifesto inline (sem servidor) para instalar no Android ──
(function(){
  try{
    const icon="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%232B5470'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle' fill='white' font-family='sans-serif'%3E👥%3C/text%3E%3C/svg%3E";
    const manifest={ name:"Constróii · Funcionários", short_name:"Funcionários", start_url:".", display:"standalone", background_color:"#EFF1EE", theme_color:"#2B5470", orientation:"any",
      icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}] };
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob); document.head.appendChild(link);
  }catch(e){}
})();
// ===== Arranque com login =====
ligarBotoesLogin();
let _arrancou=false;
async function arrancarComUtilizador(){
  if(_arrancou){ return; }
  _arrancou=true;
  // 1) carregar o que houver na nuvem
  let temNuvem=false;
  try{
    fbDocRef = fbDB.collection('obras_es').doc(FB_DOC);
    const snap=await fbDocRef.get();
    if(snap.exists){ const d=snap.data(); if(d&&d.store){ try{ localStorage.setItem(KEY_MULTI, d.store); temNuvem=true; }catch(e){} } }
  }catch(e){ console.error('carregar nuvem', e); }
  // 2) load() normal (usa o que está em localStorage, que pode ter vindo da nuvem)
  await load();
  // 3) se a nuvem estava vazia, envia o que temos local para a nuvem (primeira vez)
  if(!temNuvem){ try{ await nuvemGuardar(); }catch(e){} }
  // 4) ligar sincronização em tempo real
  ligarSyncTempoReal();
}
if(fbReady){
  fbAuth.onAuthStateChanged(u=>{
    fbUser=u;
    if(u){ esconderLogin(); arrancarComUtilizador(); }
    else { mostrarLogin(''); }
  });
} else {
  // sem Firebase (ex: aberto como ficheiro local) — funciona só com armazenamento local
  esconderLogin(); load();
}
